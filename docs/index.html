<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Con 브리핑">
<link rel="manifest" href="manifest.json">
<title>소비자 데일리 브리핑</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000E5C'/><g opacity='0.12'><ellipse cx='16' cy='11' rx='4.5' ry='5.5' stroke='white' stroke-width='1.2' fill='none'/><rect x='9' y='13.5' width='14' height='10' rx='0.8' stroke='white' stroke-width='1.2' fill='none'/><line x1='16' y1='13.5' x2='16' y2='23.5' stroke='white' stroke-width='0.8'/></g><text x='16' y='21' text-anchor='middle' font-family='Georgia,serif' font-size='13' fill='white' font-weight='bold'>Con</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Theme System ────────────────────────────────────────────────────────── */
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    /* Editorial (default) */
    --bg:#F5F3EF; --surface:#FFFFFF; --surface2:#FAFAF8;
    --border:#E2DFD8; --text:#1A1A24; --muted:#72718A;
    --navy:#003478; --gold:#C07B10; --accent:#003478;
    --tag-bg:#EDF1FA; --tag-text:#003478;
    --hdr-bg:#003478; --hdr-text:#FFFFFF; --hdr-muted:rgba(255,255,255,.65);
    --tab-active:#003478; --tab-bg:#FFFFFF;
    --card-radius:2px; --card-shadow:none; --pill-radius:3px;
    /* Legacy aliases */
    --navy-dark:#002660; --navy-surface:#002660;
    --warm-mid:#F3EFE8; --warm-subtle:#FAF7F3; --border-warm:rgba(192,123,16,.18);
    /* Type scale */
    --fs-1:5px;--fs-2:7px;--fs-3:9px;--fs-4:12px;
    --fs-5:clamp(14px,2.1vw,16px);--fs-6:clamp(18px,2.8vw,21px);--fs-7:clamp(22px,3.6vw,28px);
    /* Spacing */
    --sp1:5px;--sp2:8px;--sp3:13px;--sp4:21px;--sp5:34px;--sp6:55px;
    /* Shadows */
    --sh-xs:0 1px 2px rgba(0,52,120,.06);
    --sh-sm:0 2px 8px rgba(0,52,120,.09),0 1px 2px rgba(0,52,120,.05);
    --sh-md:0 4px 18px rgba(0,52,120,.11),0 2px 5px rgba(0,52,120,.06);
    --sh-lg:0 8px 36px rgba(0,52,120,.14),0 3px 8px rgba(0,52,120,.07);
    /* Density */
    --card-pad:22px;
    /* Timing */
    --t-micro:100ms;--t-std:300ms;--ease:cubic-bezier(.4,0,.2,1);
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans KR',sans-serif; min-height:100vh;
  }
  body[data-theme="dark"] {
    --bg:#0C1829;--surface:#132236;--surface2:#0F1D30;
    --border:#1E3049;--text:#DDE5F0;--muted:#7A93B0;
    --navy:#5BA3E8;--gold:#F0B429;--accent:#5BA3E8;
    --tag-bg:#1A2E45;--tag-text:#7DBDE8;
    --hdr-bg:#0C1829;--hdr-text:#DDE5F0;--hdr-muted:rgba(221,229,240,.55);
    --tab-active:#5BA3E8;--tab-bg:#132236;
    --card-radius:10px;--card-shadow:0 2px 12px rgba(0,0,0,.3);--pill-radius:6px;
    --navy-dark:#0C1829;--navy-surface:#0C1829;
    --warm-mid:#1A2E45;--warm-subtle:#0F1D30;--border-warm:rgba(240,180,41,.15);
    --sh-xs:0 1px 3px rgba(0,0,0,.3);--sh-sm:0 2px 8px rgba(0,0,0,.35);
    --sh-md:0 4px 18px rgba(0,0,0,.4);--sh-lg:0 8px 36px rgba(0,0,0,.45);
  }
  body[data-theme="minimal"] {
    --bg:#FFFFFF;--surface:#FFFFFF;--surface2:#F7F7F7;
    --border:#ECECEC;--text:#111111;--muted:#888888;
    --navy:#003478;--gold:#C07B10;--accent:#003478;
    --tag-bg:#F2F2F2;--tag-text:#555555;
    --hdr-bg:#FFFFFF;--hdr-text:#111111;--hdr-muted:#999999;
    --tab-active:#111111;--tab-bg:#FFFFFF;
    --card-radius:0px;--card-shadow:none;--pill-radius:2px;
    --navy-dark:#FFFFFF;--navy-surface:#F7F7F7;
    --warm-mid:#F7F7F7;--warm-subtle:#FAFAFA;--border-warm:#ECECEC;
    --sh-xs:none;--sh-sm:none;--sh-md:none;--sh-lg:none;
  }
  body[data-density="compact"] { --card-pad:14px 20px; }
  body[data-density="comfy"]   { --card-pad:28px 24px; }
  * { scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  a { color:inherit; text-decoration:none; }

  /* ── Animations ─────────────────────────────────────────────────────────── */
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes spin   { to{transform:rotate(360deg)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.35} }
  @keyframes fadein { from{opacity:0;transform:translateY(var(--sp2))} to{opacity:1;transform:none} }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  .hd { background:var(--hdr-bg); position:sticky; top:0; z-index:200; box-shadow:0 1px 0 rgba(0,0,0,.08); padding-top:env(safe-area-inset-top,0); }
  body[data-theme="minimal"] .hd { border-bottom:2px solid var(--text); box-shadow:none; }
  body[data-theme="dark"]    .hd { border-bottom:1px solid var(--border); box-shadow:none; }
  .hd-inner { max-width:1120px; margin:0 auto; padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; }
  .hd-watermark { display:none; }
  .logo-area { display:flex; align-items:center; gap:var(--sp3); }
  .snu-box { width:36px; height:36px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; letter-spacing:-.03em; color:#fff; background:rgba(255,255,255,.18); font-family:'DM Mono',monospace; }
  body[data-theme="dark"]    .snu-box { background:var(--navy); }
  body[data-theme="minimal"] .snu-box { background:var(--navy); border:2px solid var(--text); }
  .eyebrow { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:.1em; color:var(--hdr-muted); text-transform:uppercase; margin-bottom:2px; }
  .main-title { font-family:'Noto Serif KR',serif; font-size:var(--fs-5); font-weight:700; color:var(--hdr-text); letter-spacing:-.02em; line-height:1.2; }
  .live { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--gold); margin-right:var(--sp2); vertical-align:middle; animation:blink 2s infinite; flex-shrink:0; }
  .hd-actions { display:flex; align-items:center; gap:4px; }
  .hd-date { font-family:'DM Mono',monospace; font-size:var(--fs-3); color:var(--hdr-muted); margin-right:var(--sp2); white-space:nowrap; }
  .icon-btn { background:none; border:none; cursor:pointer; padding:7px 9px; border-radius:8px; display:flex; align-items:center; justify-content:center; gap:5px; color:var(--hdr-muted); font-family:'Noto Sans KR',sans-serif; font-size:var(--fs-3); transition:background var(--t-micro),color var(--t-micro); min-height:36px; min-width:36px; }
  .icon-btn:hover { background:rgba(255,255,255,.12); color:var(--hdr-text); }
  body[data-theme="minimal"] .icon-btn:hover, body[data-theme="dark"] .icon-btn:hover { background:var(--surface2); color:var(--text); }
  .icon-btn:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  .icon-btn.active, .icon-btn.on { color:var(--gold); }
  .theme-pill { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:.05em; color:var(--hdr-muted); white-space:nowrap; }
  .notif-toggle { background:none; border:1px solid rgba(255,255,255,.12); cursor:pointer; padding:var(--sp1) var(--sp2); border-radius:6px; display:inline-flex; align-items:center; gap:var(--sp1); font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:.06em; color:rgba(255,255,255,.38); transition:all var(--t-micro); min-height:30px; }
  .notif-toggle:hover { border-color:rgba(255,255,255,.25); color:rgba(255,255,255,.7); }
  .notif-toggle.on { border-color:rgba(109,212,113,.4); color:#6DD471; }
  .notif-toggle .nb-dot { width:5px; height:5px; border-radius:50%; background:#6DD471; flex-shrink:0; display:none; }
  .notif-toggle.on .nb-dot { display:inline-block; }
  body[data-theme="minimal"] .notif-toggle,
  body[data-theme="dark"]    .notif-toggle { color:var(--muted); border-color:var(--border); }

  /* ── Tab Nav ─────────────────────────────────────────────────────────────── */
  .tab-nav { background:var(--tab-bg); border-bottom:1px solid var(--border); position:sticky; top:60px; z-index:190; }
  .tab-nav-inner { max-width:1120px; margin:0 auto; padding:0 20px; display:flex; overflow-x:auto; }
  .tab-nav-inner::-webkit-scrollbar { display:none; }
  .tab { background:none; border:none; cursor:pointer; padding:14px 18px; font-size:13.5px; font-weight:400; color:var(--muted); border-bottom:2px solid transparent; white-space:nowrap; font-family:'Noto Sans KR',sans-serif; transition:color var(--t-micro),border-color var(--t-micro),font-weight var(--t-micro); min-height:44px; display:flex; align-items:center; justify-content:center; }
  .tab:hover:not(.on) { color:var(--text); }
  .tab:focus-visible  { outline:2px solid var(--gold); outline-offset:-2px; border-radius:2px; }
  .tab.on { font-weight:600; color:var(--tab-active); border-bottom-color:var(--tab-active); }

  /* ── Charts ─────────────────────────────────────────────────────────────── */
  .charts-row { background:var(--navy-surface); border-bottom:1px solid rgba(201,176,114,.07); display:none; }
  body[data-theme="minimal"] .charts-row { background:var(--surface2); border-bottom-color:var(--border); }
  .charts-inner { max-width:1120px; margin:0 auto; padding:var(--sp3) var(--sp5) var(--sp4); }
  .chart-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:var(--sp2); gap:var(--sp4); }
  .chart-tabs { display:flex; gap:var(--sp1); }
  .chart-tab { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.1em; text-transform:uppercase; padding:var(--sp1) var(--sp3); border-radius:4px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(250,248,245,0.3); cursor:pointer; transition:all var(--t-micro) var(--ease); min-height:28px; }
  .chart-tab.on { background:rgba(255,255,255,0.08); color:#FAF8F5; border-color:rgba(255,255,255,0.2); }
  .chart-tab:hover:not(.on) { color:rgba(250,248,245,0.55); }
  .chart-stat { text-align:right; }
  .chart-val-big { font-family:'DM Mono',monospace; font-size:22px; color:#FAF8F5; font-weight:500; letter-spacing:-0.02em; display:block; }
  .chart-chg-big { font-family:'DM Mono',monospace; font-size:var(--fs-3); margin-top:2px; display:block; letter-spacing:0.04em; }
  .chart-chg-big.up { color:#6DD471; }
  .chart-chg-big.dn { color:#EF5350; }
  .chart-no-data { height:72px; display:flex; align-items:center; justify-content:center; color:rgba(250,248,245,0.14); font-family:'DM Mono',monospace; font-size:var(--fs-3); }
  .chart-wrap { position:relative; }
  .chart-tooltip { position:absolute; background:hsla(228,80%,6%,.95); color:#FAF8F5; font-family:'DM Mono',monospace; font-size:var(--fs-3); padding:var(--sp1) var(--sp2); border-radius:4px; pointer-events:none; white-space:nowrap; opacity:0; transition:opacity var(--t-micro); z-index:10; border:1px solid rgba(201,176,114,0.2); }

  /* ── Ticker ──────────────────────────────────────────────────────────────── */
  .ticker { background:var(--navy-surface); padding:var(--sp2) var(--sp5); font-family:'DM Mono',monospace; font-size:var(--fs-4); display:flex; gap:var(--sp5); overflow-x:auto; }
  .ticker::-webkit-scrollbar { display:none; }
  .ti { color:rgba(250,248,245,.35); white-space:nowrap; }
  .ti b { color:rgba(250,248,245,.8); font-weight:400; margin-left:var(--sp2); }
  body[data-theme="dark"]    .ti { color:var(--muted); }
  body[data-theme="dark"]    .ti b { color:var(--text); }
  body[data-theme="minimal"] .ticker { background:var(--surface2); border-bottom:1px solid var(--border); }
  body[data-theme="minimal"] .ti { color:var(--muted); }
  body[data-theme="minimal"] .ti b { color:var(--text); }
  .up { color:#6DD471 !important; }
  .dn { color:#EF5350 !important; }

  /* ── Main ────────────────────────────────────────────────────────────────── */
  .main { max-width:1120px; margin:0 auto; padding:var(--sp5) var(--sp4) var(--sp6); }
  .panel { display:none; animation:fadein var(--t-std) var(--ease); }
  .panel.on { display:block; }

  /* ── Summary ─────────────────────────────────────────────────────────────── */
  .summary { border-left:3px solid var(--gold); padding:var(--sp3) var(--sp4); margin-bottom:var(--sp5); background:rgba(192,123,16,.04); border-radius:0 6px 6px 0; }
  body[data-theme="dark"] .summary { background:rgba(240,180,41,.06); }
  .sum-label { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:.16em; color:var(--gold); text-transform:uppercase; margin-bottom:var(--sp2); opacity:.9; }
  .sum-text { font-size:var(--fs-5); color:var(--muted); line-height:1.85; font-weight:300; }

  /* ── Card grid ───────────────────────────────────────────────────────────── */
  .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  @media (max-width:700px) { .news-grid { grid-template-columns:1fr; } }
  .card-hover { transition:box-shadow .18s,transform .18s; }
  .card-hover:hover { box-shadow:0 6px 24px rgba(0,0,0,.08) !important; transform:translateY(-2px); }
  body[data-theme="dark"]    .card-hover:hover { box-shadow:0 6px 24px rgba(0,0,0,.4) !important; }
  body[data-theme="minimal"] .card-hover:hover { box-shadow:none !important; transform:none; border-color:#999 !important; }
  .news-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--card-radius); box-shadow:var(--card-shadow); padding:var(--card-pad,22px); display:flex; flex-direction:column; gap:11px; cursor:pointer; animation:fadeIn .3s ease-out; }
  .card-tags { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .tag-pill { display:inline-flex; align-items:center; background:var(--tag-bg); color:var(--tag-text); font-size:11px; font-weight:500; padding:3px 9px; border-radius:var(--pill-radius); letter-spacing:.01em; font-family:'DM Mono',monospace; }
  .card-title { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:600; line-height:1.55; color:var(--text); letter-spacing:-.015em; }
  .card-body  { font-size:13px; line-height:1.75; color:var(--muted); }
  .card-insight { font-size:13px; color:var(--text); line-height:1.75; border-left:2px solid var(--navy); padding:var(--sp2) var(--sp3); background:rgba(0,52,120,.04); border-radius:0 6px 6px 0; }
  body[data-theme="dark"] .card-insight { background:rgba(91,163,232,.07); }
  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
  .card-source { display:flex; gap:10px; font-size:12px; color:var(--muted); align-items:center; flex:1; min-width:0; flex-wrap:wrap; }
  .src-link { font-size:11.5px; color:var(--accent); font-weight:600; text-decoration:none; transition:opacity var(--t-micro); }
  .src-link:hover { opacity:.7; }
  .src-label { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }
  .bm-star { background:none; border:none; cursor:pointer; color:var(--border); font-size:16px; padding:5px 6px; transition:color var(--t-micro); line-height:1; min-width:32px; min-height:32px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .bm-star:hover { color:var(--gold); }
  .bm-star.on { color:var(--gold); }

  /* Legacy bookmark btn (papers, company cards) */
  .bm-btn { position:absolute; top:var(--sp3); right:var(--sp3); background:none; border:none; cursor:pointer; padding:var(--sp1); color:rgba(0,52,120,.18); line-height:0; transition:color var(--t-micro); z-index:1; }
  .bm-btn:hover, .bm-btn.on { color:var(--gold); }
  .bm-btn svg { stroke:currentColor; fill:none; transition:fill var(--t-micro); }
  .bm-btn.on svg { fill:currentColor; }

  /* ── Skeleton loading ────────────────────────────────────────────────────── */
  .skeleton-box { background:var(--border); border-radius:4px; animation:pulse 1.6s ease-in-out infinite; }
  .skel-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--card-radius); padding:22px; display:flex; flex-direction:column; gap:12px; }

  /* ── Loading / empty ─────────────────────────────────────────────────────── */
  .loading, .empty { text-align:center; padding:var(--sp6) var(--sp4); color:var(--muted); }
  .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto var(--sp3); }
  .loading p, .empty p { font-size:var(--fs-4); line-height:1.7; }

  /* ── Search bar ──────────────────────────────────────────────────────────── */
  .search-bar { background:var(--navy-surface); border-bottom:1px solid rgba(201,176,114,.1); display:none; }
  .search-bar.open { display:block; }
  body[data-theme="minimal"] .search-bar, body[data-theme="dark"] .search-bar { background:var(--surface2); border-bottom-color:var(--border); }
  .search-inner { max-width:1120px; margin:0 auto; padding:var(--sp3) var(--sp5); display:flex; gap:var(--sp2); }
  .search-input { flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:6px; padding:var(--sp2) var(--sp3); font-family:'Noto Sans KR',sans-serif; font-size:var(--fs-4); color:#FAF8F5; outline:none; transition:border-color var(--t-micro); min-height:44px; }
  .search-input::placeholder { color:rgba(250,248,245,.24); }
  .search-input:focus { border-color:rgba(201,176,114,.42); }
  body[data-theme="minimal"] .search-input, body[data-theme="dark"] .search-input { color:var(--text); background:var(--surface); border-color:var(--border); }
  body[data-theme="minimal"] .search-input::placeholder, body[data-theme="dark"] .search-input::placeholder { color:var(--muted); }
  .search-go { padding:0 var(--sp4); background:var(--gold); color:#fff; border:none; border-radius:6px; font-family:'DM Mono',monospace; font-size:var(--fs-3); font-weight:600; cursor:pointer; white-space:nowrap; min-height:44px; transition:opacity var(--t-micro); }
  .search-go:hover { opacity:.88; }
  .search-result-label { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:var(--sp4); }

  /* ── Side panel ──────────────────────────────────────────────────────────── */
  .sp-overlay { position:fixed; inset:0; background:hsla(228,60%,6%,.5); z-index:1500; display:none; }
  .sp-overlay.open { display:block; }
  .side-panel { position:fixed; top:0; right:0; height:100%; width:360px; max-width:90vw; background:var(--surface); z-index:1600; transform:translateX(100%); transition:transform var(--t-std) cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:-8px 0 40px rgba(0,0,0,.12); }
  .side-panel.open { transform:translateX(0); }
  .sp-hd { background:var(--hdr-bg); padding:calc(env(safe-area-inset-top,0px) + var(--sp4)) var(--sp4) var(--sp3); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .sp-title { font-family:'Noto Serif KR',serif; font-size:var(--fs-5); font-weight:600; color:var(--hdr-text); }
  .sp-close { background:none; border:none; cursor:pointer; color:var(--hdr-muted); font-size:22px; line-height:1; padding:var(--sp1); transition:color var(--t-micro); min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
  .sp-close:hover { color:var(--hdr-text); }
  .sp-body { flex:1; overflow-y:auto; background:var(--bg); }
  .sp-body::-webkit-scrollbar { width:3px; }
  .sp-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .sp-sec { border-bottom:1px solid var(--border); }
  .sp-sec-hd { padding:var(--sp3) var(--sp4) var(--sp2); display:flex; justify-content:space-between; align-items:center; }
  .sp-sec-title { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:.14em; text-transform:uppercase; color:var(--navy); }
  .sp-sec-count { font-family:'DM Mono',monospace; font-size:var(--fs-3); color:var(--muted); }
  .sp-sec-hd.accordion { cursor:pointer; user-select:none; }
  .sp-sec-hd.accordion:hover { background:rgba(0,0,0,0.03); }
  .sp-sec-chevron { font-size:10px; color:#bbb; transition:transform 0.2s ease; display:inline-block; margin-left:auto; }
  .sp-sec.open .sp-sec-chevron { transform:rotate(180deg); }

    <span id="paper-weekly-badge" class="weekly-badge" style="display:none"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>매주 월요일 업데이트</span>
    <div class="paper-top-bar">
      <div class="paper-search-wrap">
        <input class="paper-search-input" id="paper-search-input"
               placeholder="논문 제목, 저자, 키워드 검색..."
               oninput="filterAndRenderPapers()">
        <button class="paper-search-clear" id="paper-clear-btn"
                onclick="clearPaperSearch()" style="display:none">×</button>
      </div>
      <div class="paper-filters">
        <select class="paper-filter-select" id="filter-sort" onchange="filterAndRenderPapers()">
          <option value="year">최신순</option>
          <option value="citation">피인용순</option>
          <option value="view">조회순</option>
          <option value="default">정확도순</option>
        </select>
        <select class="paper-filter-select" id="filter-year" onchange="filterAndRenderPapers()">
          <option value="">발행연도 전체</option>
        </select>
        <select class="paper-filter-select" id="filter-topic" onchange="filterAndRenderPapers()">
          <option value="">주제 전체</option>
          <option>소비자 행동</option>
          <option>구매 의사결정</option>
          <option>마케팅 전략</option>
          <option>소비자 만족/불만족</option>
          <option>온라인/디지털 소비</option>
          <option>지속가능 소비/윤리적 소비</option>
          <option>브랜드 태도</option>
          <option>소비자 정보처리</option>
          <option>가격 지각</option>
          <option>소비자 복지/정책</option>
        </select>
        <select class="paper-filter-select" id="filter-method" onchange="filterAndRenderPapers()">
          <option value="">분석방법 전체</option>
        </select>
        <button class="paper-adv-toggle" id="paper-adv-btn" onclick="toggleAdvFilters()">저자 · 소속 ▾</button>
      </div>
      <div class="paper-adv-section" id="paper-adv-section">
        <div class="paper-adv-inner">
          <div class="paper-cb-group">
            <div class="paper-cb-group-title">저자 (다중 선택)</div>
            <div class="paper-cb-list" id="author-cb-list"><span class="paper-cb-empty">불러오는 중...</span></div>
          </div>
          <div class="paper-cb-group" id="affil-cb-group" style="display:none">
            <div class="paper-cb-group-title">저자 소속 (다중 선택)</div>
            <div class="paper-cb-list" id="affil-cb-list"><span class="paper-cb-empty">데이터 없음</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="paper-result-info" id="paper-result-info"></div>
    <div id="paper-list"></div>
    <div style="text-align:center;padding:20px 0;display:none" id="paper-load-more-wrap">
      <button class="paper-load-more-btn" onclick="loadMorePapers()">논문 더 보기</button>
    </div>
  </div>
  <div class="panel" id="panel-firm">
    <div id="firm-content"><div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div></div>
  </div>
  <div class="panel" id="panel-archive"></div>
  <div class="panel" id="panel-search"></div>
  <div class="update-bar" id="ubar"></div>
</div>

<script>
  const now = new Date();
  document.getElementById('hdate').textContent = now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});

  // ── Theme cycling ────────────────────────────────────────────────────────
  const THEMES = ['editorial','dark','minimal'];
  const THEME_LABELS = {editorial:'에디토리얼', dark:'다크', minimal:'미니멀'};
  let _currentTheme = localStorage.getItem('briefing_theme') || 'editorial';
  function applyTheme(t) {
    _currentTheme = t;
    if (t === 'editorial') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', t);
    const lbl = document.getElementById('theme-label');
    if (lbl) lbl.textContent = THEME_LABELS[t] || t;
    localStorage.setItem('briefing_theme', t);
    // Update notif toggle border color for minimal
    const notif = document.getElementById('notif-toggle');
    if (notif) notif.style.borderColor = '';
  }
  window.cycleTheme = function() {
    const idx = THEMES.indexOf(_currentTheme);
    applyTheme(THEMES[(idx + 1) % THEMES.length]);
  };
  applyTheme(_currentTheme);

  function switchTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('panel-' + id).classList.add('on');
    if (id === 'paper') ensurePapersLoaded();
    if (id === 'firm') ensureCompaniesLoaded();
  }

  // 특정 날짜 아카이브 열기
  async function openArchiveDate(date) {
    const panel = document.getElementById('panel-archive');
    panel.innerHTML = '<div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>';
    try {
      const res = await fetch(`archive/${date}.json?t=` + Date.now());
      if (!res.ok) throw new Error();
      const data = await res.json();
      const s = data.sections || {};
      const [y, m, d] = date.split('-');
      const weekday = new Date(date).toLocaleDateString('ko-KR', { weekday: 'long' });
      let activeSection = 'econ';

      function renderArchiveSection(secId) {
        const sectionMap = { econ: s.econ, pol: s.politics, con: s.consumer };
        const secData = sectionMap[secId];
        const tc = secId === 'econ' ? '' : secId;
        if (!secData || !secData.cards || !secData.cards.length) {
          return '<div class="empty"><p>데이터가 없습니다.</p></div>';
        }
        const bms = getBookmarks();
        const cards = secData.cards.map((c, i) => {
          const cardId = `arch-${date}-${secId}-${i}`;
          window._cardData[cardId] = { ...c, tc };
          return cardHtml(cardId, c, tc, !!bms[cardId]);
        }).join('');
        return `<div class="summary"><div class="sum-label">요약</div><div class="sum-text">${secData.summary||''}</div></div><div class="news-grid">${cards}</div>`;
      }

      function renderArchivePanel() {
        const tabs = [['econ','경제 상황'],['pol','정치·사회'],['con','소비자 이슈']].map(([id,label]) =>
          `<button class="arch-detail-tab ${id===activeSection?'on':''}" onclick="archSwitchTab('${id}',this)">${label}</button>`
        ).join('');
        panel.innerHTML = `
          <div class="arch-header">
            <div class="arch-title">${m}월 ${parseInt(d)}일 (${weekday}) 브리핑</div>
            <button class="arch-back" onclick="toggleSidePanel()">← 목록으로</button>
          </div>
          <div class="arch-detail-tabs">${tabs}</div>
          <div id="arch-content">${renderArchiveSection(activeSection)}</div>`;
        window._archRenderSection = renderArchiveSection;
      }

      window.archSwitchTab = function(secId, btn) {
        activeSection = secId;
        document.querySelectorAll('.arch-detail-tab').forEach(t => t.classList.remove('on'));
        btn.classList.add('on');
        document.getElementById('arch-content').innerHTML = window._archRenderSection(secId);
      };

      renderArchivePanel();
    } catch {
      panel.innerHTML = '<div class="empty"><p>브리핑을 불러오지 못했어요.</p></div>';
    }
  }

  function renderSection(id, data) {
    const tc = id === 'econ' ? '' : id === 'pol' ? 'pol' : 'con';
    if (!data || !data.cards || !data.cards.length) {
      document.getElementById('panel-' + id).innerHTML = '<div class="empty"><p>아직 오늘의 브리핑이 없어요.<br>매일 오전 7시에 자동 업데이트됩니다.</p></div>';
      return;
    }
    const bms = getBookmarks();
    const cards = data.cards.map((c, i) => {
      const cardId = `today-${id}-${i}`;
      window._cardData[cardId] = { ...c, tc };
      const sources = (c.sources && c.sources.length) ? `<div class="sources"><span class="src-label">출처</span>${c.sources.map(s=>`<a class="src-link" href="${s.url||'#'}" target="_blank" rel="noopener">${s.title||'출처'}</a>`).join('')}</div>` : (c.source_ids && c.source_ids.length ? `<div class="sources"><span class="src-label">출처</span>${c.source_ids.map(sid=>`<span class="src-label">${sid}</span>`).join('')}</div>` : '');
      return cardHtml(cardId, c, tc, !!bms[cardId]);
    }).join('');
    document.getElementById('panel-' + id).innerHTML = `
      <div class="summary"><div class="sum-label">오늘의 요약</div><div class="sum-text">${data.summary||''}</div></div>
      <div class="news-grid">${cards}</div>`;
  }

  function renderCharts(mc) {
    const W = 600, H = 72;
    const DEFS = [{ key:'kospi', label:'KOSPI' }, { key:'nasdaq', label:'NASDAQ' }];

    function buildCoords(history) {
      const prices = history.map(h => h.close);
      const min = Math.min(...prices), max = Math.max(...prices);
      const range = max - min || 1;
      return prices.map((p, i) => ({
        x: (i / (prices.length - 1)) * W,
        y: H - 5 - ((p - min) / range) * (H - 12),
        price: p,
        date: history[i].date
      }));
    }

    function showChart(key) {
      const d = mc[key];
      const valEl = document.getElementById('chart-val-big');
      const chgEl = document.getElementById('chart-chg-big');
      const area  = document.getElementById('chart-svg-area');
      if (!d) {
        valEl.textContent = '—';
        chgEl.textContent = 'NO DATA';
        chgEl.className = 'chart-chg-big';
        area.innerHTML = '<div class="chart-no-data">데이터 없음</div>';
        return;
      }
      const up = d.change_pct >= 0;
      const color = up ? '#66BB6A' : '#EF5350';
      const arrow = up ? '▲' : '▼';
      valEl.textContent = d.current.toLocaleString();
      chgEl.textContent = `${arrow}${Math.abs(d.change_pct).toFixed(2)}%`;
      chgEl.className = `chart-chg-big ${up ? 'up' : 'dn'}`;

      const coords = buildCoords(d.history);
      const pts = coords.map(c => `${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');

      area.innerHTML = `
        <div class="chart-wrap">
          <div id="chart-tooltip" class="chart-tooltip"></div>
          <svg id="chart-svg" width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;cursor:crosshair">
            <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
            <line id="chart-xhair" x1="0" y1="0" x2="0" y2="${H}" stroke="rgba(250,248,245,0.22)" stroke-width="1" stroke-dasharray="3,2" visibility="hidden"/>
            <circle id="chart-dot" r="3.5" fill="${color}" stroke="#000C22" stroke-width="1.5" visibility="hidden"/>
            <rect id="chart-overlay" width="${W}" height="${H}" fill="transparent"/>
          </svg>
        </div>`;

      const svg     = document.getElementById('chart-svg');
      const xhair   = document.getElementById('chart-xhair');
      const dot     = document.getElementById('chart-dot');
      const tooltip = document.getElementById('chart-tooltip');
      const overlay = document.getElementById('chart-overlay');

      overlay.addEventListener('mousemove', function(e) {
        const rect = svg.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (W / rect.width);
        const n = coords.length;
        const idx = Math.min(Math.max(Math.round(mx / W * (n - 1)), 0), n - 1);
        const c = coords[idx];
        xhair.setAttribute('x1', c.x.toFixed(1)); xhair.setAttribute('x2', c.x.toFixed(1));
        xhair.setAttribute('visibility', 'visible');
        dot.setAttribute('cx', c.x.toFixed(1)); dot.setAttribute('cy', c.y.toFixed(1));
        dot.setAttribute('visibility', 'visible');
        const [, m, day] = c.date.split('-');
        tooltip.textContent = `${parseInt(m)}/${parseInt(day)}  ${c.price.toLocaleString()}`;
        tooltip.style.opacity = '1';
        const pxLeft = e.clientX - rect.left;
        const flip = pxLeft > rect.width * 0.65;
        tooltip.style.left  = flip ? 'auto' : (pxLeft + 12) + 'px';
        tooltip.style.right = flip ? (rect.width - pxLeft + 12) + 'px' : 'auto';
        tooltip.style.top = Math.max(2, e.clientY - rect.top - 32) + 'px';
      });
      overlay.addEventListener('mouseleave', function() {
        xhair.setAttribute('visibility', 'hidden');
        dot.setAttribute('visibility', 'hidden');
        tooltip.style.opacity = '0';
      });
    }

    window.switchChart = function(key, btn) {
      document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('on'));
      btn.classList.add('on');
      showChart(key);
    };

    // 항상 두 탭 모두 표시
    const tabs = DEFS.map(({ key, label }, i) =>
      `<button class="chart-tab${i===0?' on':''}" onclick="switchChart('${key}',this)">${label}</button>`
    ).join('');

    const row = document.getElementById('charts-row');
    row.innerHTML = `<div class="charts-inner">
      <div class="chart-top">
        <div class="chart-tabs">${tabs}</div>
        <div class="chart-stat">
          <span id="chart-val-big" class="chart-val-big"></span>
          <span id="chart-chg-big" class="chart-chg-big"></span>
        </div>
      </div>
      <div id="chart-svg-area"></div>
    </div>`;
    row.style.display = 'block';
    showChart(DEFS[0].key);
  }

  async function loadBriefing() {
    try {
      const res = await fetch('briefing.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      const data = await res.json();
      const s = data.sections || {};
      renderSection('econ', s.econ);
      renderSection('pol', s.politics);
      renderSection('con', s.consumer);

      const econCards = (s.econ || {}).cards || [];
      const allText = econCards.map(c => (c.body || '') + ' ' + (c.headline || '')).join(' ');
      const kospi = allText.match(/KOSPI[가는이]?\s*([\d,]+\.?\d*)/i)?.[1] || '—';
      const fx = allText.match(/원달러환율[은이]?\s*([\d,]+)원/)?.[1] || allText.match(/([\d,]+)원을\s*기록/)?.[1] || allText.match(/(1[,\d]+)원/)?.[1] || '—';
      const rate = allText.match(/기준금리[를은이]?\s*([\d.]+)%/)?.[1] || allText.match(/([\d.]+)%에서\s*동결/)?.[1] || allText.match(/([\d.]+)%로\s*동결/)?.[1] || '—';
      document.getElementById('ticker').innerHTML = `
        <div class="ti">KOSPI <b>${kospi !== '—' ? kospi : '—'}</b></div>
        <div class="ti">USD/KRW <b>${fx !== '—' ? fx + '원' : '—'}</b></div>
        <div class="ti">기준금리 <b>${rate !== '—' ? rate + '%' : '—'}</b></div>
        <div class="ti">업데이트 <b>${data.date_kr || '—'}</b></div>`;
      document.getElementById('ubar').textContent = '마지막 업데이트: ' + (data.date_kr || '—');
      if (data.market_charts) renderCharts(data.market_charts);
    } catch {
      ['econ','pol','con'].forEach(id => {
        document.getElementById('panel-' + id).innerHTML = '<div class="empty"><p>브리핑을 불러오지 못했어요.<br>매일 오전 7시에 자동 업데이트됩니다.</p></div>';
      });
    }
  }

  // sw.js는 PWA 캐시용으로만 등록 (FCM은 firebase-messaging-sw.js가 별도 처리)
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

  // 알림 활성 여부: 브라우저 권한 granted + FCM 토큰 존재 + 사용자가 끄지 않은 상태
  function isNotifOn() {
    return 'Notification' in window
      && Notification.permission === 'granted'
      && !!localStorage.getItem('fcm_token_key')
      && !localStorage.getItem('notif_off');
  }

  // 알림 토글 버튼 상태 업데이트 (FCM 모듈에서도 호출 가능하도록 window에 노출)
  window.updateNotifBtn = function() {
    const btn   = document.getElementById('notif-toggle');
    const label = document.getElementById('notif-toggle-label');
    if (!btn || !('Notification' in window)) return;
    if (isNotifOn()) {
      label.textContent = '알림 ON';
      btn.classList.add('on');
      btn.title = '클릭하면 알림이 꺼집니다';
    } else {
      label.textContent = '알림 OFF';
      btn.classList.remove('on');
      btn.title = Notification.permission === 'denied'
        ? '브라우저 설정에서 알림을 허용해 주세요'
        : '클릭해서 매일 오전 7시 알림 받기';
    }
  };
  window.updateNotifBtn();

  // 알림 버튼 클릭 핸들러 — ON이면 끄기, OFF면 켜기
  window.handleNotifBtn = function() {
    if (!('Notification' in window)) return;
    if (isNotifOn()) {
      if (typeof window.turnOffNotif === 'function') window.turnOffNotif();
    } else {
      if (typeof window.askNotif === 'function') window.askNotif();
    }
  };

  // ── 북마크 ──────────────────────────────────────────────────────────────────
  window._cardData = {};

  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem('bookmarks') || '{}'); } catch { return {}; }
  }

  const BM_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

  function bmBtn(cardId, isOn) {
    return `<button class="bm-btn${isOn?' on':''}" data-bm-id="${cardId}" onclick="toggleBookmark('${cardId}')" title="북마크">${BM_SVG}</button>`;
  }

  window.toggleBookmark = function(cardId) {
    const bms = getBookmarks();
    if (bms[cardId]) {
      delete bms[cardId];
    } else {
      const d = window._cardData[cardId];
      if (d) bms[cardId] = d;
    }
    localStorage.setItem('bookmarks', JSON.stringify(bms));
    const on = !!bms[cardId];
    document.querySelectorAll(`[data-bm-id="${cardId}"]`).forEach(btn => {
      btn.classList.toggle('on', on);
      if (btn.classList.contains('bm-star')) btn.textContent = on ? '★' : '☆';
    });
    updateBmBtn();
    if (document.getElementById('side-panel').classList.contains('open')) renderSidePanel();
  };

  function cardHtml(cardId, c, tc, isOn) {
    const srcLinks = (c.sources || []).slice(0,2).map(s =>
      `<a class="src-link" href="${s.url||'#'}" target="_blank" rel="noopener">${s.title||'출처'}</a>`
    ).join('');
    return `<div class="news-card card-hover">
      <div class="card-tags">
        <span class="tag-pill">${c.tag||''}</span>
      </div>
      <h3 class="card-title">${c.headline||''}</h3>
      <p class="card-body">${c.body||''}</p>
      ${c.insight?`<div class="card-insight">${c.insight}</div>`:''}
      <div class="card-footer">
        <div class="card-source">${srcLinks}</div>
        <button class="bm-star${isOn?' on':''}" data-bm-id="${cardId}" onclick="toggleBookmark('${cardId}')" title="북마크">${isOn?'★':'☆'}</button>
      </div>
    </div>`;
  }

  function updateBmBtn() {
    const count = Object.keys(getBookmarks()).length;
    const btn = document.getElementById('panel-btn');
    if (btn) btn.classList.toggle('active', count > 0);
    const lbl = document.getElementById('bm-count-label');
    if (lbl) lbl.textContent = count > 0 ? String(count) : '북마크';
  }

  function toggleSpSec(id) {
    document.getElementById(id).classList.toggle('open');
  }

  function renderSidePanel() {
    const body = document.getElementById('sp-body');
    const entries = Object.entries(getBookmarks());
    const bmHtml = entries.length
      ? entries.map(([id, c]) => `
          <div class="bm-item">
            <div class="bm-item-content">
              <div class="bm-item-tag">${c.tag||''}</div>
              <div class="bm-item-headline">${c.headline||''}</div>
            </div>
            <button class="bm-rm-btn" onclick="toggleBookmark('${id}')" title="북마크 제거">×</button>
          </div>`).join('')
      : '<div class="sp-empty">저장된 북마크가 없어요</div>';

    body.innerHTML = `
      <div class="sp-sec">
        <div class="sp-sec-hd">
          <span class="sp-sec-title">북마크</span>
          <span class="sp-sec-count">${entries.length}개</span>
        </div>
        ${bmHtml}
      </div>
      <div class="sp-sec" id="sp-arch-sec">
        <div class="sp-sec-hd accordion" onclick="toggleSpSec('sp-arch-sec')">
          <span class="sp-sec-title">브리핑 아카이브</span>
          <span class="sp-sec-chevron">▼</span>
        </div>
        <div class="sp-sec-body">
          <div class="sp-empty">불러오는 중...</div>
        </div>
      </div>
      <div class="sp-sec" id="sp-firm-arch-sec">
        <div class="sp-sec-hd accordion" onclick="toggleSpSec('sp-firm-arch-sec')">
          <span class="sp-sec-title">기업 분석 아카이브</span>
          <span class="sp-sec-chevron">▼</span>
        </div>
        <div class="sp-sec-body">

  window.doSearch = async function() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const sp = document.getElementById('panel-search');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    sp.classList.add('on');
    sp.innerHTML = '<div class="loading"><div class="spinner"></div><p>검색 중...</p></div>';
    try {
      const res = await fetch('archive/index.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      const { dates } = await res.json();
      const results = [];
      await Promise.all(dates.map(async d => {
        try {
          const r = await fetch(`archive/${d}.json`);
          if (!r.ok) return;
          const data = await r.json();
          const secMap = { econ: data.sections?.econ, pol: data.sections?.politics, con: data.sections?.consumer };
          for (const [secId, sec] of Object.entries(secMap)) {
            if (!sec?.cards) continue;
            sec.cards.forEach((c, i) => {
              const text = (c.headline + ' ' + c.body + ' ' + c.insight).toLowerCase();
              if (text.includes(q.toLowerCase())) {
                const cardId = `arch-${d}-${secId}-${i}`;
                const tc = secId === 'econ' ? '' : secId;
                window._cardData[cardId] = { ...c, tc };
                results.push({ cardId, c, tc, date: d });
              }
            });
          }
        } catch {}
      }));
      results.sort((a, b) => b.date.localeCompare(a.date));
      if (!results.length) {
        sp.innerHTML = `<div class="search-result-label">"${q}" 검색 결과 없음</div><div class="empty"><p>일치하는 브리핑이 없어요.</p></div>`;
        return;
      }
      const bms = getBookmarks();
      const cards = results.map(({ cardId, c, tc }) => cardHtml(cardId, c, tc, !!bms[cardId])).join('');
      sp.innerHTML = `<div class="search-result-label">"${q}" 검색 결과 ${results.length}건</div><div class="news-grid">${cards}</div>`;
    } catch {
      sp.innerHTML = '<div class="empty"><p>검색 중 오류가 발생했어요.</p></div>';
    }
  };

  updateBmBtn();

  // ── 소비자 논문 탭 ──────────────────────────────────────────────────────────
  let _allPapers = [], _filteredPapers = [], _paperShowing = 0, _papersLoaded = false;
  const PAPER_PAGE = 20;

  async function ensurePapersLoaded() {
    if (_papersLoaded) return;
    const list = document.getElementById('paper-list');
    if (!list) return;
    list.innerHTML = '<div class="loading"><div class="spinner"></div><p>논문 목록 불러오는 중...</p></div>';
    try {
      const res = await fetch('papers.json?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      _allPapers = data.papers || [];
      _papersLoaded = true;

      // 연도 필터 옵션 동적 생성
      const years = [...new Set(_allPapers.map(p => p.year).filter(Boolean))].sort((a, b) => b - a);
      const ySel = document.getElementById('filter-year');
      if (ySel) years.forEach(y => {
        const o = document.createElement('option');
        o.value = y; o.textContent = y + '년';
        ySel.appendChild(o);
      });

      // 분석방법 필터 동적 생성 (데이터 기반)
      const methods = [...new Set(_allPapers.map(p => p.method).filter(Boolean))].sort();
      const mSel = document.getElementById('filter-method');
      if (mSel) methods.forEach(m => {
        const o = document.createElement('option');
        o.value = m; o.textContent = m;
        mSel.appendChild(o);
      });

      // 저자 체크박스 생성 (상위 20명)
      const authorCount = {};
      _allPapers.forEach(p => (p.authors || []).forEach(a => { authorCount[a] = (authorCount[a] || 0) + 1; }));
      const topAuthors = Object.entries(authorCount).sort((a, b) => b[1] - a[1]).slice(0, 20);
      const cbList = document.getElementById('author-cb-list');
      if (cbList) {
        if (topAuthors.length) {
          cbList.innerHTML = topAuthors.map(([name, cnt]) =>
            `<label class="paper-cb-item"><input type="checkbox" class="paper-author-cb" value="${name}" onchange="filterAndRenderPapers()"><span>${name}</span><span class="paper-cb-count">${cnt}</span></label>`
          ).join('');
        } else {
          cbList.innerHTML = '<span class="paper-cb-empty">저자 데이터 없음</span>';
        }
      }

      // 소속 체크박스 생성 (데이터 있으면)
      const hasAffil = _allPapers.some(p => p.affiliations && p.affiliations.length);
      if (hasAffil) {
        const affilCount = {};
        _allPapers.forEach(p => (p.affiliations || []).forEach(a => { if(a) affilCount[a] = (affilCount[a] || 0) + 1; }));
        const topAffils = Object.entries(affilCount).sort((a, b) => b[1] - a[1]).slice(0, 15);
        const afList = document.getElementById('affil-cb-list');
        const afGroup = document.getElementById('affil-cb-group');
        if (afGroup) afGroup.style.display = '';
        if (afList && topAffils.length) {
          afList.innerHTML = topAffils.map(([name, cnt]) =>
            `<label class="paper-cb-item"><input type="checkbox" class="paper-affil-cb" value="${name}" onchange="filterAndRenderPapers()"><span>${name}</span><span class="paper-cb-count">${cnt}</span></label>`
          ).join('');
        }
      }

      const info = document.getElementById('paper-result-info');
      if (info) info.dataset.updatedAt = (data.updated_at || '').slice(0, 10);

      const paperBadgeWrap = document.getElementById('paper-weekly-badge');
      if (paperBadgeWrap) paperBadgeWrap.style.display = '';

      filterAndRenderPapers();
    } catch {
      const list2 = document.getElementById('paper-list');
      if (list2) list2.innerHTML = `
        <div class="paper-setup-hint">
          <strong>📋 논문 데이터 수집 필요</strong>
          아래 스크립트를 KCI API 승인 IP에서 실행하면 논문 목록이 자동으로 업데이트됩니다.<br>
          <code>python scripts/fetch_papers.py</code><br>
          IP 화이트리스트 문의: <code>042-869-6736</code> (평일 09:00–18:00)
        </div>
        <div class="paper-empty-state">
          <div class="pei">📄</div>
          <p>아직 수집된 논문이 없어요.<br>스크립트를 실행하여 논문 데이터를 채워 주세요.</p>
        </div>`;
    }
  }

  window.filterAndRenderPapers = function() {
    if (!_papersLoaded) return;
    const q       = (document.getElementById('paper-search-input')?.value || '').toLowerCase().trim();
    const fSort   = document.getElementById('filter-sort')?.value || 'year';
    const fYear   = document.getElementById('filter-year')?.value || '';
    const fTopic  = document.getElementById('filter-topic')?.value || '';
    const fMethod = document.getElementById('filter-method')?.value || '';
    const selAuthors = [...document.querySelectorAll('.paper-author-cb:checked')].map(cb => cb.value);
    const selAffils  = [...document.querySelectorAll('.paper-affil-cb:checked')].map(cb => cb.value);

    const clearBtn = document.getElementById('paper-clear-btn');
    if (clearBtn) clearBtn.style.display = q ? 'block' : 'none';

    let papers = _allPapers.filter(p => {
      if (fYear   && String(p.year) !== fYear)  return false;
      if (fTopic  && p.topic !== fTopic)         return false;
      if (fMethod && p.method !== fMethod)        return false;
      if (selAuthors.length && !selAuthors.some(a => (p.authors || []).includes(a))) return false;
      if (selAffils.length  && !selAffils.some(a => (p.affiliations || []).some(af => af.includes(a)))) return false;
      if (q) {
        const txt = [p.title, ...(p.authors || []), p.abstract || '', ...(p.keywords || [])].join(' ').toLowerCase();
        if (!txt.includes(q)) return false;
      }
      return true;
    });

    if (fSort === 'year') {
      papers = [...papers].sort((a, b) => {
        if ((b.year || 0) !== (a.year || 0)) return (b.year || 0) - (a.year || 0);
        return (b.pub_month || 0) - (a.pub_month || 0);
      });
    } else if (fSort === 'citation') {
      papers = [...papers].sort((a, b) => (b.citation_count || 0) - (a.citation_count || 0));
    } else if (fSort === 'view') {
      papers = [...papers].sort((a, b) => (b.view_count || 0) - (a.view_count || 0));
    }
    // fSort === 'default': papers.json 원본 순서 유지

    _filteredPapers = papers;
    _paperShowing = 0;
    renderPaperSlice(true);
  };

  window.clearPaperSearch = function() {
    const inp = document.getElementById('paper-search-input');
    if (inp) { inp.value = ''; inp.focus(); }
    filterAndRenderPapers();
  };

  window.loadMorePapers = function() { renderPaperSlice(false); };

  function renderPaperSlice(reset) {
    const list     = document.getElementById('paper-list');
    const info     = document.getElementById('paper-result-info');
    const moreWrap = document.getElementById('paper-load-more-wrap');
    if (!list) return;

    const slice = _filteredPapers.slice(_paperShowing, _paperShowing + PAPER_PAGE);

    if (reset) {
      const hasFilter = (document.getElementById('paper-search-input')?.value.trim() ||
        document.getElementById('filter-year')?.value   ||
        document.getElementById('filter-topic')?.value  ||
        document.getElementById('filter-method')?.value ||
        (document.getElementById('filter-sort')?.value || 'year') !== 'year');
      const upd = info?.dataset.updatedAt || '';
      if (info) info.textContent = hasFilter
        ? `${_filteredPapers.length}건 검색됨 · 전체 ${_allPapers.length}건`
        : `총 ${_allPapers.length}건${upd ? ' · ' + upd + ' 기준' : ''}`;

      if (!_filteredPapers.length) {
        list.innerHTML = '<div class="paper-empty-state"><div class="pei">🔍</div><p>검색 결과가 없어요.<br>다른 키워드나 필터를 시도해 보세요.</p></div>';
        if (moreWrap) moreWrap.style.display = 'none';
        return;
      }
      list.innerHTML = slice.map(paperCardHtml).join('');
    } else {
      list.insertAdjacentHTML('beforeend', slice.map(paperCardHtml).join(''));
    }

    _paperShowing += slice.length;
    if (moreWrap) moreWrap.style.display = _paperShowing < _filteredPapers.length ? 'block' : 'none';
  }

  function paperCardHtml(p) {
    const url = 'https://www.kci.go.kr/kciportal/ci/sereArticleSearch/ciSereArtiView.kci?sereArticleSearchBean.artiId=' + encodeURIComponent(p.id || '');
    const authors = (p.authors || []).join(', ') || '—';
    const kws = (p.keywords || []).slice(0, 5).map(k => `<span class="paper-kw">${k}</span>`).join('');
    const statsHtml = (p.citation_count || p.view_count) ? `<div class="paper-card-stats">${p.view_count ? `<span class="paper-stat" title="조회수">👁 ${p.view_count.toLocaleString()}</span>` : ''}${p.citation_count ? `<span class="paper-stat" title="피인용수">📑 ${p.citation_count}</span>` : ''}</div>` : '';
    return `<a class="paper-card" href="${url}" target="_blank" rel="noopener">
  ${statsHtml}
  <div class="paper-card-tags" style="${statsHtml ? 'padding-right:100px' : ''}">
    ${p.journal ? `<span class="paper-chip journal">${p.journal}</span>` : ''}
    ${p.year    ? `<span class="paper-chip year">${p.year}</span>` : ''}
    ${p.topic   ? `<span class="paper-chip topic">${p.topic}</span>` : ''}
    ${p.method  ? `<span class="paper-chip method">${p.method}</span>` : ''}
  </div>
  <div class="paper-title-text">${p.title || ''}</div>
  <div class="paper-authors">${authors}</div>
  ${p.abstract ? `<div class="paper-abstract">${p.abstract}</div>` : ''}
  ${kws ? `<div class="paper-keywords">${kws}</div>` : ''}
</a>`;
  }

  const WEEKLY_BADGE = `<span class="weekly-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>매주 월요일 업데이트</span>`;

  function renderCompanyPanel() {
    const data = _companiesData;

    }).join('');

    const cards = (activeInd ? activeInd.companies || [] : []).map(function(c) {
      const cardId = 'firm-' + _activeIndustry + '-' + (c.id || c.name);
      window._cardData[cardId] = { tag: activeInd.name, headline: c.name_ko || c.name, type: 'company', company: c };
      return renderFirmCard(c, cardId, !!bms[cardId]);
    }).join('');
    const upd = data.updated_at ? data.updated_at.slice(0, 10) : '';

    container.innerHTML = WEEKLY_BADGE +
      '<div class="firm-industry-tabs">' + tabs + '</div>' +
      (cards || '<div class="empty"><p>기업 데이터가 없어요.</p></div>') +
      (upd ? '<div class="update-bar">기업 분석 기준일: ' + upd + '</div>' : '');
  }

  window.switchFirmIndustry = function(id) {
    _activeIndustry = id;
    renderCompanyPanel();
  };

  function renderFirmCard(c, cardId, isOn) {
    const swot = c.swot || {};
    const strengths  = (swot.strengths     || []).map(function(s) { return '<li>' + s + '</li>'; }).join('');
    const weaknesses = (swot.weaknesses    || []).map(function(s) { return '<li>' + s + '</li>'; }).join('');
    const opps       = (swot.opportunities || []).map(function(s) { return '<li>' + s + '</li>'; }).join('');
    const threats    = (swot.threats       || []).map(function(s) { return '<li>' + s + '</li>'; }).join('');
    const swotHtml = '<div class="firm-swot">' +
      '<div class="firm-swot-item s"><div class="firm-swot-label">Strengths · 강점</div><ul class="firm-swot-list">' + strengths + '</ul></div>' +
      '<div class="firm-swot-item w"><div class="firm-swot-label">Weaknesses · 약점</div><ul class="firm-swot-list">' + weaknesses + '</ul></div>' +
      '<div class="firm-swot-item o"><div class="firm-swot-label">Opportunities · 기회</div><ul class="firm-swot-list">' + opps + '</ul></div>' +
      '<div class="firm-swot-item t"><div class="firm-swot-label">Threats · 위협</div><ul class="firm-swot-list">' + threats + '</ul></div>' +
      '</div>';
    const issues = (c.recent_issues || []).map(function(issue) {
      return '<div class="firm-issue-item"><div class="firm-issue-title">' + (issue.title || '') + '</div><div class="firm-issue-content">' + (issue.content || '') + '</div></div>';
    }).join('');
    const metaParts = [];
    if (c.ticker)  metaParts.push('<span class="paper-chip year">'    + c.ticker  + '</span>');
    if (c.country) metaParts.push('<span class="paper-chip journal">' + c.country + '</span>');
    const meta = metaParts.join('');
    const bm = bmBtn(cardId, isOn);
    return '<div class="firm-company-card">' +
      bm +
      '<div class="firm-company-name">' + (c.name_ko || c.name || '') + '</div>' +
      '<div class="firm-company-sub">'  + (c.name || '')               + '</div>' +
      '<div class="firm-company-meta">' + meta                          + '</div>' +
      (c.overview ? '<span class="firm-section-label">기업 개요</span><div class="firm-section-text">' + c.overview + '</div>' : '') +
      '<span class="firm-section-label" style="margin-top:22px">SWOT 분석</span>' +
      swotHtml +
      (c.consumer_strategy ? '<span class="firm-section-label">소비자 전략</span><div class="firm-section-text">' + c.consumer_strategy + '</div>' : '') +
      (issues ? '<span class="firm-section-label">최근 이슈</span><div class="firm-issues">' + issues + '</div>' : '') +
      '<div class="firm-updated">기준일: ' + (c.updated_at || '') + '</div>' +
      '</div>';
  }

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) document.getElementById('ios-hint').classList.add('show');

  loadBriefing();
</script>

<!-- Firebase Cloud Messaging -->
<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getMessaging, getToken, deleteToken } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging.js';

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAijGdIJXGidRLUZTMYb2A-4LFvunFMUDo",
  authDomain:        "consumer-briefing.firebaseapp.com",
  projectId:         "consumer-briefing",
  storageBucket:     "consumer-briefing.appspot.com",
  messagingSenderId: "579742111110",
  appId:             "1:579742111110:web:26a7408aac887c4b0b8807"
};
const FCM_VAPID_KEY = "BB1qlZhAHRsG-Zefd9K-DcLLWL7ysZ66iMtXFB75STlN3IBGvKs4T4F9J-Pn8Od23ITvRdS0HPayWcAcmqRN9ck";
const FIREBASE_DB_URL = "https://consumer-briefing-default-rtdb.asia-southeast1.firebasedatabase.app";

// ── 디버그 헬퍼 ──────────────────────────────────────────────────────────────
const dbg = (...a) => console.log('[FCM]', ...a);
const dbgErr = (...a) => console.error('[FCM]', ...a);

// ── Firebase 초기화 ──────────────────────────────────────────────────────────
let _messaging = null;
try {
  dbg('Firebase 초기화 시작...');
  const app = initializeApp(FIREBASE_CONFIG);
  _messaging = getMessaging(app);
  dbg('Firebase 초기화 성공 ✓');
} catch (e) {
  dbgErr('Firebase 초기화 실패:', e);
}

// ── 환경 진단 (페이지 로드 시 자동 실행) ────────────────────────────────────
dbg('환경 진단:');
dbg('  HTTPS 여부:', location.protocol === 'https:' ? '✓' : '✗ (HTTPS 필요)');
dbg('  ServiceWorker 지원:', 'serviceWorker' in navigator ? '✓' : '✗');
dbg('  Notification 지원:', 'Notification' in window ? '✓' : '✗');
dbg('  현재 알림 권한:', Notification.permission);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    dbg('  등록된 SW 목록:', regs.map(r => r.scope));
  });
}

// ── 토큰 등록 ────────────────────────────────────────────────────────────────
async function registerToken() {
  const swReg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
  dbg('SW scope:', swReg.scope);
  await navigator.serviceWorker.ready;
  dbg('SW ready ✓');

  dbg('FCM 토큰 요청 중 (VAPID 사용)...');
  const token = await getToken(_messaging, {
    vapidKey: FCM_VAPID_KEY,
    serviceWorkerRegistration: swReg
  });
  if (!token) throw new Error('getToken()이 빈 값 반환');
  dbg('토큰 발급 성공 ✓ (앞 20자):', token.substring(0, 20) + '...');

  const key = token.substring(0, 40).replace(/[.#$[\]]/g, '_');
  localStorage.setItem('fcm_token_key', key); // 나중에 삭제할 때 사용

  dbg('DB 저장 중... PUT →', `fcm_tokens/${key}`);
  const res = await fetch(`${FIREBASE_DB_URL}/fcm_tokens/${key}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, created_at: new Date().toISOString() })
  });
  dbg('HTTP 응답:', res.status, res.statusText);
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`DB 저장 실패 (${res.status}): ${body}`);
  }
  dbg('DB 저장 성공 ✓');
}

// ── 이미 권한 granted + 사용자가 끄지 않은 경우 자동 토큰 등록 ──────────────
async function registerTokenIfGranted() {
  if (!_messaging || Notification.permission !== 'granted') return;
  if (localStorage.getItem('notif_off') === '1') {
    dbg('사용자가 알림을 끈 상태 → 자동 등록 건너뜀');
    return;
  }
  dbg('권한 이미 granted → 자동 토큰 등록 시도');
  try {
    await registerToken();
    dbg('자동 토큰 등록 완료 ✓');
  } catch (err) {
    dbgErr('자동 토큰 등록 실패:', err);
  }
  if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
}
registerTokenIfGranted();

// ── 알림 켜기 ────────────────────────────────────────────────────────────────
window.askNotif = async function() {
  if (!_messaging) { dbgErr('messaging 객체 없음'); return; }
  dbg('── 알림 켜기 시작 ──');
  try {
    dbg('알림 권한 요청...');
    const perm = await Notification.requestPermission();
    dbg('결과:', perm);
    if (perm !== 'granted') {
      dbgErr('알림 권한 거부됨');
      if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
      return;
    }

    await registerToken();
    localStorage.removeItem('notif_off');

    new Notification('알림 설정 완료!', {
      body: '매일 오전 7시에 브리핑을 보내드려요.',
      icon: 'snu_ui_download.png',
      tag: 'briefing-confirm'
    });
    dbg('── 알림 켜기 완료 ──');
    if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
  } catch (err) {
    dbgErr('알림 켜기 실패:', err);
  }
};

// ── 알림 끄기 ────────────────────────────────────────────────────────────────
window.turnOffNotif = async function() {
  dbg('── 알림 끄기 시작 ──');
  try {
    // 1) FCM SDK 토큰 삭제 (브라우저 레벨)
    if (_messaging) {
      await deleteToken(_messaging);
      dbg('FCM 토큰 삭제 완료 ✓');
    }
    // 2) Firebase DB에서 토큰 삭제
    const key = localStorage.getItem('fcm_token_key');
    if (key) {
      const res = await fetch(`${FIREBASE_DB_URL}/fcm_tokens/${key}.json`, { method: 'DELETE' });
      dbg('DB 토큰 삭제 HTTP 응답:', res.status, res.statusText);
      localStorage.removeItem('fcm_token_key');
    } else {
      dbg('저장된 토큰 키 없음 — DB 삭제 건너뜀');
    }
    // 3) 사용자 OFF 상태 저장
    localStorage.setItem('notif_off', '1');
    dbg('── 알림 끄기 완료 ──');
    if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
  } catch (err) {
    dbgErr('알림 끄기 실패:', err);
  }
};
</script>
