<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000E5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Con 브리핑">
<link rel="manifest" href="manifest.json">
<title>소비자 데일리 브리핑</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000E5C'/><g opacity='0.12'><ellipse cx='16' cy='11' rx='4.5' ry='5.5' stroke='white' stroke-width='1.2' fill='none'/><rect x='9' y='13.5' width='14' height='10' rx='0.8' stroke='white' stroke-width='1.2' fill='none'/><line x1='16' y1='13.5' x2='16' y2='23.5' stroke='white' stroke-width='0.8'/></g><text x='16' y='21' text-anchor='middle' font-family='Georgia,serif' font-size='13' fill='white' font-weight='bold'>Con</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --navy:#000E5C; --gold:#C9B072; --bg:#FAF8F5; --border:rgba(0,14,92,0.08); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:#111; font-family:'Noto Sans KR',sans-serif; min-height:100vh; }

  .hd { background:#00112E; position:relative; overflow:hidden; padding-top:env(safe-area-inset-top,0); }
  .hd-watermark { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0.07; pointer-events:none; }
  .hd-watermark img { width:420px; height:420px; object-fit:contain; filter:brightness(10); }
  .hd-inner { max-width:1080px; margin:0 auto; padding:24px 24px 0; position:relative; z-index:1; }
  .hd-top { display:flex; justify-content:space-between; align-items:center; padding-bottom:20px; gap:12px; flex-wrap:wrap; }
  .logo-area { display:flex; align-items:center; gap:14px; }
  .logo-area img.snu-logo { width:48px; height:48px; object-fit:contain; filter:brightness(0) saturate(100%) invert(75%) sepia(40%) saturate(500%) hue-rotate(5deg); }
  .eyebrow { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.18em; color:var(--gold); text-transform:uppercase; margin-bottom:6px; }
  .main-title { font-family:'Noto Serif KR',serif; font-size:24px; font-weight:700; color:#FAF8F5; letter-spacing:-0.02em; line-height:1.1; }
  .meta { text-align:right; }
  .meta-date { font-family:'Noto Serif KR',serif; font-size:14px; color:rgba(250,248,245,0.9); }
  .meta-time { font-family:'DM Mono',monospace; font-size:10px; color:rgba(250,248,245,0.35); margin-top:3px; }
  .live { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--gold); margin-right:5px; vertical-align:middle; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .sep { height:1px; background:rgba(201,176,114,0.18); }
  .tabs { display:flex; max-width:1080px; margin:0 auto; padding:0 24px; }
  .tab { flex:1; padding:13px 8px; text-align:center; font-size:12px; font-weight:400; color:rgba(250,248,245,0.38); border:none; background:transparent; cursor:pointer; border-bottom:2px solid transparent; letter-spacing:0.03em; transition:all 0.2s; font-family:'Noto Sans KR',sans-serif; }
  .tab.on { color:#FAF8F5; border-bottom-color:var(--gold); font-weight:500; }

  .ticker { background:#000C22; padding:8px 24px; font-family:'DM Mono',monospace; font-size:11px; display:flex; gap:32px; overflow-x:auto; }
  .ticker::-webkit-scrollbar { display:none; }
  .ti { color:rgba(250,248,245,0.4); white-space:nowrap; }
  .ti b { color:rgba(250,248,245,0.85); font-weight:400; margin-left:6px; }
  .up { color:#66BB6A !important; }
  .dn { color:#EF5350 !important; }

  .main { max-width:1080px; margin:0 auto; padding:24px 24px 60px; }
  .panel { display:none; animation:fadein 0.25s ease; }
  .panel.on { display:block; }
  @keyframes fadein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

  .summary { border-left:3px solid var(--gold); padding:13px 18px; margin-bottom:22px; background:rgba(201,176,114,0.06); border-radius:0 8px 8px 0; }
  .sum-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.14em; color:var(--gold); text-transform:uppercase; margin-bottom:6px; }
  .sum-text { font-size:14px; color:#555; line-height:1.85; font-weight:300; }

  .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; }
  @media (max-width:720px) { .grid { grid-template-columns:1fr; } }
  @media (min-width:480px) and (max-width:720px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }

  .card { background:white; border-radius:12px; overflow:hidden; display:flex; flex-direction:column; border:1px solid var(--border); }
  .card-bar { height:3px; background:var(--navy); }
  .card.pol .card-bar { background:#1B5E3B; }
  .card.con .card-bar { background:#7B4A00; }
  .card-inner { padding:18px 18px 14px; flex:1; display:flex; flex-direction:column; position:relative; }
  .tag { display:inline-block; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; padding:4px 10px; border-radius:20px; margin-bottom:12px; background:rgba(0,14,92,0.07); color:var(--navy); }
  .card.pol .tag { background:rgba(27,94,59,0.07); color:#1B5E3B; }
  .card.con .tag { background:rgba(123,74,0,0.07); color:#7B4A00; }
  .headline { font-family:'Noto Serif KR',serif; font-size:16px; font-weight:600; line-height:1.55; margin-bottom:10px; color:#111827; }
  .body-text { font-size:13px; color:#6B7280; line-height:1.85; flex:1; font-weight:300; }
  .insight { margin-top:13px; padding:12px 14px; border-radius:8px; font-size:12.5px; line-height:1.7; background:#F5F6FF; color:#374151; border:1px solid rgba(0,14,92,0.07); }
  .card.pol .insight { background:#F0FFF4; border-color:rgba(27,94,59,0.08); }
  .card.con .insight { background:#FFFBF5; border-color:rgba(123,74,0,0.08); }
  .i-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:4px; color:var(--navy); opacity:0.55; }
  .card.pol .i-label { color:#1B5E3B; }
  .card.con .i-label { color:#7B4A00; }
  .sources { margin-top:13px; padding-top:10px; border-top:1px solid #F3F0EA; display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
  .src-label { font-family:'DM Mono',monospace; font-size:9px; color:#C4BFB5; letter-spacing:0.08em; text-transform:uppercase; }
  .src-link { font-size:12px; color:var(--navy); text-decoration:none; opacity:0.6; border-bottom:1px solid var(--gold); padding-bottom:1px; transition:opacity 0.15s; }
  .src-link:hover { opacity:1; }

  .loading, .empty { text-align:center; padding:60px 20px; color:#aaa; }
  .spinner { width:32px; height:32px; border:2px solid #e5e0d5; border-top-color:var(--navy); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading p, .empty p { font-size:13px; line-height:1.7; }

  .notif-toggle { display:inline-flex; align-items:center; gap:5px; margin-top:7px; padding:4px 10px 4px 7px; border-radius:20px; border:1px solid rgba(250,248,245,0.15); background:rgba(255,255,255,0.06); cursor:pointer; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.06em; color:rgba(250,248,245,0.45); transition:all 0.2s; }
  .notif-toggle:hover { border-color:rgba(250,248,245,0.3); color:rgba(250,248,245,0.7); }
  .notif-toggle.on { border-color:rgba(102,187,106,0.5); color:#66BB6A; background:rgba(102,187,106,0.1); }
  .notif-toggle .nb-dot { width:6px; height:6px; border-radius:50%; background:#66BB6A; flex-shrink:0; display:none; }
  .notif-toggle.on .nb-dot { display:inline-block; }

  .bm-btn { position:absolute; top:12px; right:12px; background:none; border:none; cursor:pointer; padding:3px; color:rgba(0,14,92,0.22); line-height:0; transition:color 0.2s; z-index:1; }
  .bm-btn:hover { color:var(--gold); }
  .bm-btn.on { color:var(--gold); }
  .bm-btn svg { stroke:currentColor; fill:none; transition:fill 0.2s; }
  .bm-btn.on svg { fill:currentColor; }
  .card.pol .bm-btn { color:rgba(27,94,59,0.22); }
  .card.pol .bm-btn:hover, .card.pol .bm-btn.on { color:#1B5E3B; }
  .card.con .bm-btn { color:rgba(123,74,0,0.22); }
  .card.con .bm-btn:hover, .card.con .bm-btn.on { color:#7B4A00; }

  .bm-section-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:#aaa; margin:20px 0 10px; }
  .bm-section-label:first-child { margin-top:0; }

  .ios-hint { background:var(--navy); color:#FAF8F5; border-radius:8px; padding:14px 18px; margin-bottom:18px; font-size:13px; line-height:1.7; display:none; }
  .ios-hint.show { display:block; }
  .ios-hint strong { display:block; font-family:'Noto Serif KR',serif; font-size:15px; margin-bottom:5px; }
  .ios-hint button { background:var(--gold); color:var(--navy); border:none; border-radius:4px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; margin-top:8px; }

  .update-bar { text-align:center; padding:8px; font-family:'DM Mono',monospace; font-size:10px; color:#bbb; border-top:1px solid #ece8e0; margin-top:32px; }

  /* 아카이브 */
  .arch-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .arch-title { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:600; color:#111827; }
  .arch-back { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--navy); border:1px solid var(--border); border-radius:6px; padding:7px 14px; background:white; cursor:pointer; text-decoration:none; font-family:'Noto Sans KR',sans-serif; transition:background 0.15s; }
  .arch-back:hover { background:#f0f0f8; }
  .arch-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
  .arch-item { background:white; border:1px solid var(--border); border-radius:10px; padding:16px 18px; cursor:pointer; transition:box-shadow 0.15s,border-color 0.15s; display:flex; flex-direction:column; gap:5px; }
  .arch-item:hover { box-shadow:0 4px 16px rgba(0,14,92,0.1); border-color:rgba(0,14,92,0.2); }
  .arch-item-date { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:600; color:#111827; }
  .arch-item-sub { font-family:'DM Mono',monospace; font-size:10px; color:#aaa; letter-spacing:0.08em; }
  .arch-detail-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .arch-detail-tab { flex:1; padding:11px 8px; text-align:center; font-size:12px; color:#aaa; border:none; background:transparent; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; font-family:'Noto Sans KR',sans-serif; }
  .arch-detail-tab.on { color:var(--navy); border-bottom-color:var(--gold); font-weight:500; }
</style>
</head>
<body>

<div class="hd">
  <div class="hd-watermark">
    <img src="snu_ui_download.png" alt="">
  </div>
  <div class="hd-inner">
    <div class="hd-top">
      <div class="logo-area">
        <img class="snu-logo" src="snu_ui_download.png" alt="SNU">
        <div>
          <div class="eyebrow">Seoul National University · Consumer Science</div>
          <div class="main-title">소비자 데일리 브리핑</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta-date"><span class="live"></span><span id="hdate"></span></div>
        <div class="meta-time" id="htime"></div>
        <button class="notif-toggle" id="notif-toggle" onclick="handleNotifBtn()">
          <span class="nb-dot"></span><span id="notif-toggle-label">알림 OFF</span>
        </button>
      </div>
    </div>
  </div>
  <div class="sep"></div>
  <div class="tabs">
    <button class="tab on" id="tab-econ" onclick="switchTab('econ',this)">경제 상황</button>
    <button class="tab" id="tab-pol" onclick="switchTab('pol',this)">정치·사회</button>
    <button class="tab" id="tab-con" onclick="switchTab('con',this)">소비자 이슈</button>
    <button class="tab" id="tab-bookmark" onclick="openBookmarks(this)">북마크</button>
    <button class="tab" id="tab-archive" onclick="openArchiveList()">아카이브</button>
  </div>
</div>

<div class="ticker" id="ticker">
  <div class="ti">브리핑 로딩 중...</div>
</div>

<div class="main">
  <div class="ios-hint" id="ios-hint">
    <strong>홈 화면에 추가하기</strong>
    Safari 하단 공유 버튼 → "홈 화면에 추가" 를 탭하면 앱처럼 사용할 수 있어요.
    <button onclick="this.closest('.ios-hint').remove()">닫기</button>
  </div>

  <div class="panel on" id="panel-econ"><div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div></div>
  <div class="panel" id="panel-pol"><div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div></div>
  <div class="panel" id="panel-con"><div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div></div>
  <div class="panel" id="panel-bookmark"></div>
  <div class="panel" id="panel-archive"></div>
  <div class="update-bar" id="ubar"></div>
</div>

<script>
  const now = new Date();
  document.getElementById('hdate').textContent = now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  document.getElementById('htime').textContent = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ' 업데이트';

  function switchTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('panel-' + id).classList.add('on');
  }

  // 아카이브 목록 열기
  async function openArchiveList() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    document.getElementById('tab-archive').classList.add('on');
    const panel = document.getElementById('panel-archive');
    panel.classList.add('on');
    panel.innerHTML = '<div class="loading"><div class="spinner"></div><p>아카이브 불러오는 중...</p></div>';
    try {
      const res = await fetch('archive/index.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      const { dates } = await res.json();
      const sorted = [...dates].sort((a, b) => b.localeCompare(a));
      const items = sorted.map(d => {
        const [y, m, day] = d.split('-');
        const weekday = new Date(d).toLocaleDateString('ko-KR', { weekday: 'short' });
        return `<div class="arch-item" onclick="openArchiveDate('${d}')">
          <div class="arch-item-date">${m}월 ${parseInt(day)}일 (${weekday})</div>
          <div class="arch-item-sub">${y} · 브리핑 보기 →</div>
        </div>`;
      }).join('');
      panel.innerHTML = `
        <div class="arch-header">
          <div class="arch-title">브리핑 아카이브</div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:#aaa;">총 ${sorted.length}개</div>
        </div>
        <div class="arch-list">${items}</div>`;
    } catch {
      panel.innerHTML = '<div class="empty"><p>아카이브를 불러오지 못했어요.</p></div>';
    }
  }

  // 특정 날짜 아카이브 열기
  async function openArchiveDate(date) {
    const panel = document.getElementById('panel-archive');
    panel.innerHTML = '<div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>';
    try {
      const res = await fetch(`archive/${date}.json?t=` + Date.now());
      if (!res.ok) throw new Error();
      const data = await res.json();
      const s = data.sections || {};
      const [y, m, d] = date.split('-');
      const weekday = new Date(date).toLocaleDateString('ko-KR', { weekday: 'long' });
      let activeSection = 'econ';

      function renderArchiveSection(secId) {
        const sectionMap = { econ: s.econ, pol: s.politics, con: s.consumer };
        const secData = sectionMap[secId];
        const tc = secId === 'econ' ? '' : secId;
        if (!secData || !secData.cards || !secData.cards.length) {
          return '<div class="empty"><p>데이터가 없습니다.</p></div>';
        }
        const bms = getBookmarks();
        const cards = secData.cards.map((c, i) => {
          const cardId = `arch-${date}-${secId}-${i}`;
          window._cardData[cardId] = { ...c, tc };
          return cardHtml(cardId, c, tc, !!bms[cardId]);
        }).join('');
        return `<div class="summary"><div class="sum-label">요약</div><div class="sum-text">${secData.summary||''}</div></div><div class="grid">${cards}</div>`;
      }

      function renderArchivePanel() {
        const tabs = [['econ','경제 상황'],['pol','정치·사회'],['con','소비자 이슈']].map(([id,label]) =>
          `<button class="arch-detail-tab ${id===activeSection?'on':''}" onclick="archSwitchTab('${id}',this)">${label}</button>`
        ).join('');
        panel.innerHTML = `
          <div class="arch-header">
            <div class="arch-title">${m}월 ${parseInt(d)}일 (${weekday}) 브리핑</div>
            <button class="arch-back" onclick="openArchiveList()">← 목록으로</button>
          </div>
          <div class="arch-detail-tabs">${tabs}</div>
          <div id="arch-content">${renderArchiveSection(activeSection)}</div>`;
        window._archRenderSection = renderArchiveSection;
      }

      window.archSwitchTab = function(secId, btn) {
        activeSection = secId;
        document.querySelectorAll('.arch-detail-tab').forEach(t => t.classList.remove('on'));
        btn.classList.add('on');
        document.getElementById('arch-content').innerHTML = window._archRenderSection(secId);
      };

      renderArchivePanel();
    } catch {
      panel.innerHTML = '<div class="empty"><p>브리핑을 불러오지 못했어요.</p></div>';
    }
  }

  function renderSection(id, data) {
    const tc = id === 'econ' ? '' : id === 'pol' ? 'pol' : 'con';
    if (!data || !data.cards || !data.cards.length) {
      document.getElementById('panel-' + id).innerHTML = '<div class="empty"><p>아직 오늘의 브리핑이 없어요.<br>매일 오전 7시에 자동 업데이트됩니다.</p></div>';
      return;
    }
    const bms = getBookmarks();
    const cards = data.cards.map((c, i) => {
      const cardId = `today-${id}-${i}`;
      window._cardData[cardId] = { ...c, tc };
      const sources = (c.sources && c.sources.length) ? `<div class="sources"><span class="src-label">출처</span>${c.sources.map(s=>`<a class="src-link" href="${s.url||'#'}" target="_blank" rel="noopener">${s.title||'출처'}</a>`).join('')}</div>` : (c.source_ids && c.source_ids.length ? `<div class="sources"><span class="src-label">출처</span>${c.source_ids.map(sid=>`<span class="src-label">${sid}</span>`).join('')}</div>` : '');
      return cardHtml(cardId, c, tc, !!bms[cardId]);
    }).join('');
    document.getElementById('panel-' + id).innerHTML = `
      <div class="summary"><div class="sum-label">오늘의 요약</div><div class="sum-text">${data.summary||''}</div></div>
      <div class="grid">${cards}</div>`;
  }

  async function loadBriefing() {
    try {
      const res = await fetch('briefing.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      const data = await res.json();
      const s = data.sections || {};
      renderSection('econ', s.econ);
      renderSection('pol', s.politics);
      renderSection('con', s.consumer);

      const econCards = (s.econ || {}).cards || [];
      const allText = econCards.map(c => (c.body || '') + ' ' + (c.headline || '')).join(' ');
      const kospi = allText.match(/KOSPI[가는이]?\s*([\d,]+\.?\d*)/i)?.[1] || '—';
      const fx = allText.match(/원달러환율[은이]?\s*([\d,]+)원/)?.[1] || allText.match(/([\d,]+)원을\s*기록/)?.[1] || allText.match(/(1[,\d]+)원/)?.[1] || '—';
      const rate = allText.match(/기준금리[를은이]?\s*([\d.]+)%/)?.[1] || allText.match(/([\d.]+)%에서\s*동결/)?.[1] || allText.match(/([\d.]+)%로\s*동결/)?.[1] || '—';
      document.getElementById('ticker').innerHTML = `
        <div class="ti">KOSPI <b>${kospi !== '—' ? kospi : '—'}</b></div>
        <div class="ti">USD/KRW <b>${fx !== '—' ? fx + '원' : '—'}</b></div>
        <div class="ti">기준금리 <b>${rate !== '—' ? rate + '%' : '—'}</b></div>
        <div class="ti">업데이트 <b>${data.date_kr || '—'}</b></div>`;
      document.getElementById('ubar').textContent = '마지막 업데이트: ' + (data.date_kr || '—');
    } catch {
      ['econ','pol','con'].forEach(id => {
        document.getElementById('panel-' + id).innerHTML = '<div class="empty"><p>브리핑을 불러오지 못했어요.<br>매일 오전 7시에 자동 업데이트됩니다.</p></div>';
      });
    }
  }

  // sw.js는 PWA 캐시용으로만 등록 (FCM은 firebase-messaging-sw.js가 별도 처리)
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

  // 알림 활성 여부: 브라우저 권한 granted + FCM 토큰 존재 + 사용자가 끄지 않은 상태
  function isNotifOn() {
    return 'Notification' in window
      && Notification.permission === 'granted'
      && !!localStorage.getItem('fcm_token_key')
      && !localStorage.getItem('notif_off');
  }

  // 알림 토글 버튼 상태 업데이트 (FCM 모듈에서도 호출 가능하도록 window에 노출)
  window.updateNotifBtn = function() {
    const btn   = document.getElementById('notif-toggle');
    const label = document.getElementById('notif-toggle-label');
    if (!btn || !('Notification' in window)) return;
    if (isNotifOn()) {
      label.textContent = '알림 ON';
      btn.classList.add('on');
      btn.title = '클릭하면 알림이 꺼집니다';
    } else {
      label.textContent = '알림 OFF';
      btn.classList.remove('on');
      btn.title = Notification.permission === 'denied'
        ? '브라우저 설정에서 알림을 허용해 주세요'
        : '클릭해서 매일 오전 7시 알림 받기';
    }
  };
  window.updateNotifBtn();

  // 알림 버튼 클릭 핸들러 — ON이면 끄기, OFF면 켜기
  window.handleNotifBtn = function() {
    if (!('Notification' in window)) return;
    if (isNotifOn()) {
      if (typeof window.turnOffNotif === 'function') window.turnOffNotif();
    } else {
      if (typeof window.askNotif === 'function') window.askNotif();
    }
  };

  // ── 북마크 ──────────────────────────────────────────────────────────────────
  window._cardData = {};

  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem('bookmarks') || '{}'); } catch { return {}; }
  }

  const BM_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

  function bmBtn(cardId, isOn) {
    return `<button class="bm-btn${isOn?' on':''}" data-bm-id="${cardId}" onclick="toggleBookmark('${cardId}')" title="북마크">${BM_SVG}</button>`;
  }

  window.toggleBookmark = function(cardId) {
    const bms = getBookmarks();
    if (bms[cardId]) {
      delete bms[cardId];
    } else {
      const d = window._cardData[cardId];
      if (d) bms[cardId] = d;
    }
    localStorage.setItem('bookmarks', JSON.stringify(bms));
    // Update all matching buttons in current DOM
    document.querySelectorAll(`[data-bm-id="${cardId}"]`).forEach(btn => {
      btn.classList.toggle('on', !!bms[cardId]);
    });
    // Re-render bookmark panel if currently visible
    const panel = document.getElementById('panel-bookmark');
    if (panel && panel.classList.contains('on')) renderBookmarkPanel();
  };

  function cardHtml(cardId, c, tc, isOn) {
    const sources = (c.sources && c.sources.length) ? `<div class="sources"><span class="src-label">출처</span>${c.sources.map(s=>`<a class="src-link" href="${s.url||'#'}" target="_blank" rel="noopener">${s.title||'출처'}</a>`).join('')}</div>` : '';
    return `<div class="card ${tc}"><div class="card-bar"></div><div class="card-inner">${bmBtn(cardId,isOn)}<span class="tag">${c.tag||''}</span><div class="headline">${c.headline||''}</div><div class="body-text">${c.body||''}</div>${c.insight?`<div class="insight"><span class="i-label">소비자학 관점</span>${c.insight}</div>`:''}${sources}</div></div>`;
  }

  function renderBookmarkPanel() {
    const panel = document.getElementById('panel-bookmark');
    const bms = getBookmarks();
    const entries = Object.entries(bms);
    if (!entries.length) {
      panel.innerHTML = '<div class="empty"><p>저장된 북마크가 없어요.<br>카드 오른쪽 상단의 책갈피 아이콘을 눌러 저장해보세요.</p></div>';
      return;
    }
    panel.innerHTML = `<div class="grid">${entries.map(([id, c]) => cardHtml(id, c, c.tc||'', true)).join('')}</div>`;
  }

  window.openBookmarks = function(btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('panel-bookmark').classList.add('on');
    renderBookmarkPanel();
  };

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) document.getElementById('ios-hint').classList.add('show');

  loadBriefing();
</script>

<!-- Firebase Cloud Messaging -->
<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getMessaging, getToken, deleteToken } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging.js';

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAijGdIJXGidRLUZTMYb2A-4LFvunFMUDo",
  authDomain:        "consumer-briefing.firebaseapp.com",
  projectId:         "consumer-briefing",
  storageBucket:     "consumer-briefing.appspot.com",
  messagingSenderId: "579742111110",
  appId:             "1:579742111110:web:26a7408aac887c4b0b8807"
};
const FCM_VAPID_KEY = "BB1qlZhAHRsG-Zefd9K-DcLLWL7ysZ66iMtXFB75STlN3IBGvKs4T4F9J-Pn8Od23ITvRdS0HPayWcAcmqRN9ck";
const FIREBASE_DB_URL = "https://consumer-briefing-default-rtdb.asia-southeast1.firebasedatabase.app";

// ── 디버그 헬퍼 ──────────────────────────────────────────────────────────────
const dbg = (...a) => console.log('[FCM]', ...a);
const dbgErr = (...a) => console.error('[FCM]', ...a);

// ── Firebase 초기화 ──────────────────────────────────────────────────────────
let _messaging = null;
try {
  dbg('Firebase 초기화 시작...');
  const app = initializeApp(FIREBASE_CONFIG);
  _messaging = getMessaging(app);
  dbg('Firebase 초기화 성공 ✓');
} catch (e) {
  dbgErr('Firebase 초기화 실패:', e);
}

// ── 환경 진단 (페이지 로드 시 자동 실행) ────────────────────────────────────
dbg('환경 진단:');
dbg('  HTTPS 여부:', location.protocol === 'https:' ? '✓' : '✗ (HTTPS 필요)');
dbg('  ServiceWorker 지원:', 'serviceWorker' in navigator ? '✓' : '✗');
dbg('  Notification 지원:', 'Notification' in window ? '✓' : '✗');
dbg('  현재 알림 권한:', Notification.permission);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    dbg('  등록된 SW 목록:', regs.map(r => r.scope));
  });
}

// ── 토큰 등록 ────────────────────────────────────────────────────────────────
async function registerToken() {
  const swReg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
  dbg('SW scope:', swReg.scope);
  await navigator.serviceWorker.ready;
  dbg('SW ready ✓');

  dbg('FCM 토큰 요청 중 (VAPID 사용)...');
  const token = await getToken(_messaging, {
    vapidKey: FCM_VAPID_KEY,
    serviceWorkerRegistration: swReg
  });
  if (!token) throw new Error('getToken()이 빈 값 반환');
  dbg('토큰 발급 성공 ✓ (앞 20자):', token.substring(0, 20) + '...');

  const key = token.substring(0, 40).replace(/[.#$[\]]/g, '_');
  localStorage.setItem('fcm_token_key', key); // 나중에 삭제할 때 사용

  dbg('DB 저장 중... PUT →', `fcm_tokens/${key}`);
  const res = await fetch(`${FIREBASE_DB_URL}/fcm_tokens/${key}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, created_at: new Date().toISOString() })
  });
  dbg('HTTP 응답:', res.status, res.statusText);
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`DB 저장 실패 (${res.status}): ${body}`);
  }
  dbg('DB 저장 성공 ✓');
}

// ── 이미 권한 granted + 사용자가 끄지 않은 경우 자동 토큰 등록 ──────────────
async function registerTokenIfGranted() {
  if (!_messaging || Notification.permission !== 'granted') return;
  if (localStorage.getItem('notif_off') === '1') {
    dbg('사용자가 알림을 끈 상태 → 자동 등록 건너뜀');
    return;
  }
  dbg('권한 이미 granted → 자동 토큰 등록 시도');
  try {
    await registerToken();
    dbg('자동 토큰 등록 완료 ✓');
  } catch (err) {
    dbgErr('자동 토큰 등록 실패:', err);
  }
  if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
}
registerTokenIfGranted();

// ── 알림 켜기 ────────────────────────────────────────────────────────────────
window.askNotif = async function() {
  if (!_messaging) { dbgErr('messaging 객체 없음'); return; }
  dbg('── 알림 켜기 시작 ──');
  try {
    dbg('알림 권한 요청...');
    const perm = await Notification.requestPermission();
    dbg('결과:', perm);
    if (perm !== 'granted') {
      dbgErr('알림 권한 거부됨');
      if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
      return;
    }

    await registerToken();
    localStorage.removeItem('notif_off');

    new Notification('알림 설정 완료!', {
      body: '매일 오전 7시에 브리핑을 보내드려요.',
      icon: 'snu_ui_download.png',
      tag: 'briefing-confirm'
    });
    dbg('── 알림 켜기 완료 ──');
    if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
  } catch (err) {
    dbgErr('알림 켜기 실패:', err);
  }
};

// ── 알림 끄기 ────────────────────────────────────────────────────────────────
window.turnOffNotif = async function() {
  dbg('── 알림 끄기 시작 ──');
  try {
    // 1) FCM SDK 토큰 삭제 (브라우저 레벨)
    if (_messaging) {
      await deleteToken(_messaging);
      dbg('FCM 토큰 삭제 완료 ✓');
    }
    // 2) Firebase DB에서 토큰 삭제
    const key = localStorage.getItem('fcm_token_key');
    if (key) {
      const res = await fetch(`${FIREBASE_DB_URL}/fcm_tokens/${key}.json`, { method: 'DELETE' });
      dbg('DB 토큰 삭제 HTTP 응답:', res.status, res.statusText);
      localStorage.removeItem('fcm_token_key');
    } else {
      dbg('저장된 토큰 키 없음 — DB 삭제 건너뜀');
    }
    // 3) 사용자 OFF 상태 저장
    localStorage.setItem('notif_off', '1');
    dbg('── 알림 끄기 완료 ──');
    if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
  } catch (err) {
    dbgErr('알림 끄기 실패:', err);
  }
};
</script>
