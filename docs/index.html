<style>
  /* ── Design tokens ───────────────────────────────────────────────────────── */
  :root {
    --navy:#000E5C; --gold:#C9B072; --bg:#FAF8F5;
    --navy-dark:#00092E; --navy-surface:#000C22;
    --warm-mid:#F3EFE8; --warm-subtle:#FAF7F3;
    --border:rgba(0,14,92,0.08); --border-warm:rgba(201,176,114,0.18);

    /* 3:4 type scale — 5 7 9 12 16 21 28 */
    --fs-1:5px; --fs-2:7px; --fs-3:9px;
    --fs-4:12px;
    --fs-5:clamp(14px,2.1vw,16px);
    --fs-6:clamp(18px,2.8vw,21px);
    --fs-7:clamp(22px,3.6vw,28px);

    /* Golden-ratio spacing φ=1.618, base=13px → 5 8 13 21 34 55 */
    --sp1:5px; --sp2:8px; --sp3:13px; --sp4:21px; --sp5:34px; --sp6:55px;

    /* Hue-shifted shadows (navy hue ~228°) */
    --sh-xs:0 1px 2px hsla(228,55%,8%,.06);
    --sh-sm:0 2px 8px hsla(228,55%,10%,.09),0 1px 2px hsla(228,55%,10%,.05);
    --sh-md:0 4px 18px hsla(228,55%,12%,.11),0 2px 5px hsla(228,55%,12%,.06);
    --sh-lg:0 8px 36px hsla(228,55%,14%,.14),0 3px 8px hsla(228,55%,14%,.07);

    /* Timing */
    --t-micro:100ms; --t-std:300ms; --ease:cubic-bezier(.4,0,.2,1);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:#111; font-family:'Noto Sans KR',sans-serif; min-height:100vh; }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  .hd { background:var(--navy-dark); position:relative; overflow:hidden; padding-top:env(safe-area-inset-top,0); }
  .hd-watermark { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0.055; pointer-events:none; }
  .hd-watermark img { width:500px; height:500px; object-fit:contain; filter:brightness(10); }
  .hd-inner { max-width:1080px; margin:0 auto; padding:var(--sp5) var(--sp5) 0; position:relative; z-index:1; }
  .hd-top { display:flex; justify-content:space-between; align-items:center; padding-bottom:var(--sp4); gap:var(--sp3); flex-wrap:wrap; }
  .logo-area { display:flex; align-items:center; gap:var(--sp3); }
  .logo-area img.snu-logo { width:44px; height:44px; object-fit:contain; filter:brightness(0) saturate(100%) invert(75%) sepia(40%) saturate(500%) hue-rotate(5deg); flex-shrink:0; }
  .eyebrow { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.18em; color:var(--gold); text-transform:uppercase; margin-bottom:var(--sp1); opacity:0.85; }
  .main-title { font-family:'Noto Serif KR',serif; font-size:var(--fs-7); font-weight:700; color:#FAF8F5; letter-spacing:-0.025em; line-height:1.15; }
  .meta { text-align:right; }
  .meta-date { font-family:'Noto Serif KR',serif; font-size:var(--fs-4); color:rgba(250,248,245,0.88); }
  .meta-time { font-family:'DM Mono',monospace; font-size:var(--fs-3); color:rgba(250,248,245,0.3); margin-top:var(--sp1); }
  .live { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--gold); margin-right:var(--sp2); vertical-align:middle; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .sep { height:1px; background:var(--border-warm); }
  .tabs { display:flex; max-width:1080px; margin:0 auto; padding:0 var(--sp5); }
  .tab { flex:1; padding:var(--sp3) var(--sp2); text-align:center; font-size:var(--fs-4); font-weight:400; color:rgba(250,248,245,0.32); border:none; background:transparent; cursor:pointer; border-bottom:2px solid transparent; letter-spacing:0.02em; transition:color var(--t-std) var(--ease),border-color var(--t-std) var(--ease); font-family:'Noto Sans KR',sans-serif; min-height:44px; display:flex; align-items:center; justify-content:center; }
  .tab:hover { color:rgba(250,248,245,0.62); }
  .tab:focus-visible { outline:2px solid var(--gold); outline-offset:-2px; border-radius:2px; }
  .tab.on { color:#FAF8F5; border-bottom-color:var(--gold); font-weight:500; }

  /* ── Charts ─────────────────────────────────────────────────────────────── */
  .charts-row { background:var(--navy-surface); border-bottom:1px solid rgba(201,176,114,0.07); display:none; }
  .charts-inner { max-width:1080px; margin:0 auto; padding:var(--sp3) var(--sp5) var(--sp4); }
  .chart-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:var(--sp2); gap:var(--sp4); }
  .chart-tabs { display:flex; gap:var(--sp1); }
  .chart-tab { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.1em; text-transform:uppercase; padding:var(--sp1) var(--sp3); border-radius:4px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(250,248,245,0.3); cursor:pointer; transition:all var(--t-micro) var(--ease); min-height:28px; }
  .chart-tab.on { background:rgba(255,255,255,0.08); color:#FAF8F5; border-color:rgba(255,255,255,0.2); }
  .chart-tab:hover:not(.on) { color:rgba(250,248,245,0.55); }
  .chart-stat { text-align:right; }
  .chart-val-big { font-family:'DM Mono',monospace; font-size:22px; color:#FAF8F5; font-weight:500; letter-spacing:-0.02em; display:block; }
  .chart-chg-big { font-family:'DM Mono',monospace; font-size:var(--fs-3); margin-top:2px; display:block; letter-spacing:0.04em; }
  .chart-chg-big.up { color:#6DD471; }
  .chart-chg-big.dn { color:#EF5350; }
  .chart-no-data { height:72px; display:flex; align-items:center; justify-content:center; color:rgba(250,248,245,0.14); font-family:'DM Mono',monospace; font-size:var(--fs-3); }
  .chart-wrap { position:relative; }
  .chart-tooltip { position:absolute; background:hsla(228,80%,6%,.95); color:#FAF8F5; font-family:'DM Mono',monospace; font-size:var(--fs-3); padding:var(--sp1) var(--sp2); border-radius:4px; pointer-events:none; white-space:nowrap; opacity:0; transition:opacity var(--t-micro); z-index:10; border:1px solid rgba(201,176,114,0.2); }

  /* ── Ticker ──────────────────────────────────────────────────────────────── */
  .ticker { background:var(--navy-surface); padding:var(--sp2) var(--sp5); font-family:'DM Mono',monospace; font-size:var(--fs-4); display:flex; gap:var(--sp5); overflow-x:auto; }
  .ticker::-webkit-scrollbar { display:none; }
  .ti { color:rgba(250,248,245,0.35); white-space:nowrap; }
  .ti b { color:rgba(250,248,245,0.8); font-weight:400; margin-left:var(--sp2); }
  .up { color:#6DD471 !important; }
  .dn { color:#EF5350 !important; }

  /* ── Main ────────────────────────────────────────────────────────────────── */
  .main { max-width:1080px; margin:0 auto; padding:var(--sp5) var(--sp5) var(--sp6); }
  .panel { display:none; animation:fadein var(--t-std) var(--ease); }
  .panel.on { display:block; }
  @keyframes fadein { from{opacity:0;transform:translateY(var(--sp2))} to{opacity:1;transform:none} }

  /* ── Summary ─────────────────────────────────────────────────────────────── */
  .summary { border-left:3px solid var(--gold); padding:var(--sp3) var(--sp4); margin-bottom:var(--sp5); background:rgba(201,176,114,0.04); border-radius:0 6px 6px 0; }
  .sum-label { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.16em; color:var(--gold); text-transform:uppercase; margin-bottom:var(--sp2); opacity:0.9; }
  .sum-text { font-size:var(--fs-5); color:#585858; line-height:1.85; font-weight:300; }

  /* ── News list ───────────────────────────────────────────────────────────── */
  .news-list { background:#fff; border-radius:10px; border:1px solid var(--border); box-shadow:var(--sh-xs); overflow:hidden; }
  .news-item { padding:var(--sp5) var(--sp5) var(--sp4); border-bottom:1px solid #f0ece4; position:relative; }
  .news-item:last-child { border-bottom:none; }

  .section-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.18em; color:var(--gold); text-transform:uppercase; border-bottom:1px solid rgba(201,176,114,0.3); padding-bottom:var(--sp2); margin-bottom:var(--sp5); display:block; }

  .article-tag { display:inline-block; font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.1em; text-transform:uppercase; padding:var(--sp1) var(--sp2); border-radius:3px; margin-bottom:var(--sp2); background:rgba(0,14,92,0.06); color:var(--navy); }
  .pol .article-tag { background:rgba(27,94,59,0.06); color:#1B5E3B; }
  .con .article-tag { background:rgba(123,74,0,0.06); color:#7B4A00; }

  .article-title { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:500; line-height:1.5; margin-bottom:var(--sp3); color:#111827; display:block; transition:color var(--t-micro) var(--ease); }
  .article-title:hover { color:var(--navy); cursor:pointer; }

  .article-body { font-size:13px; color:#6B7280; line-height:1.85; margin-bottom:var(--sp3); font-weight:300; }

  .article-insight { margin-bottom:var(--sp3); padding:var(--sp2) var(--sp3); border-left:2px solid var(--navy); background:rgba(0,14,92,0.03); border-radius:0 6px 6px 0; font-size:13px; color:#374151; line-height:1.85; }
  .pol .article-insight { border-left-color:#1B5E3B; background:rgba(27,94,59,0.03); }
  .con .article-insight { border-left-color:#7B4A00; background:rgba(123,74,0,0.03); }
  .i-label { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:var(--sp1); color:var(--navy); opacity:0.5; }
  .pol .i-label { color:#1B5E3B; }

  .src-label { font-family:'DM Mono',monospace; font-size:11px; color:#C4BFB5; letter-spacing:0.1em; text-transform:uppercase; }
  .src-link { font-size:11px; color:var(--navy); text-decoration:none; opacity:0.55; border-bottom:1px solid rgba(201,176,114,0.55); padding-bottom:1px; transition:opacity var(--t-micro); }
  .src-link:hover { opacity:1; }

  /* ── Loading / empty states ──────────────────────────────────────────────── */
  .loading, .empty { text-align:center; padding:var(--sp6) var(--sp4); color:#aaa; }
  .spinner { width:28px; height:28px; border:2px solid #e8e3db; border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto var(--sp3); }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading p, .empty p { font-size:var(--fs-4); line-height:1.7; }

  /* ── Notification toggle ─────────────────────────────────────────────────── */
  .notif-toggle { display:inline-flex; align-items:center; gap:var(--sp1); padding:var(--sp1) var(--sp2); border-radius:4px; border:1px solid rgba(250,248,245,0.12); background:transparent; cursor:pointer; font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.06em; color:rgba(250,248,245,0.38); transition:all var(--t-micro) var(--ease); min-height:30px; }
  .notif-toggle:hover { border-color:rgba(250,248,245,0.25); color:rgba(250,248,245,0.7); }
  .notif-toggle.on { border-color:rgba(109,212,113,0.4); color:#6DD471; }
  .notif-toggle .nb-dot { width:5px; height:5px; border-radius:50%; background:#6DD471; flex-shrink:0; display:none; }
  .notif-toggle.on .nb-dot { display:inline-block; }

  /* ── Bookmark btn ────────────────────────────────────────────────────────── */
  .bm-btn { position:absolute; top:var(--sp3); right:var(--sp3); background:none; border:none; cursor:pointer; padding:var(--sp1); color:rgba(0,14,92,0.18); line-height:0; transition:color var(--t-micro); z-index:1; }
  .bm-btn:hover { color:var(--gold); }
  .bm-btn:focus-visible { outline:2px solid var(--gold); border-radius:3px; }
  .bm-btn.on { color:var(--gold); }
  .bm-btn svg { stroke:currentColor; fill:none; transition:fill var(--t-micro); }
  .bm-btn.on svg { fill:currentColor; }
  .card.pol .bm-btn { color:rgba(27,94,59,0.18); }
  .card.pol .bm-btn:hover,.card.pol .bm-btn.on { color:#1B5E3B; }
  .card.con .bm-btn { color:rgba(123,74,0,0.18); }
  .card.con .bm-btn:hover,.card.con .bm-btn.on { color:#7B4A00; }

  /* ── Header icon buttons ─────────────────────────────────────────────────── */
  .meta-btns { display:flex; align-items:center; gap:var(--sp1); justify-content:flex-end; margin-top:var(--sp2); }
  .hd-icon-btn { display:inline-flex; align-items:center; justify-content:center; min-width:44px; min-height:44px; border-radius:6px; border:1px solid rgba(250,248,245,0.1); background:transparent; cursor:pointer; font-size:15px; color:rgba(250,248,245,0.42); transition:background var(--t-micro),border-color var(--t-micro),color var(--t-micro); padding:0; }
  .hd-icon-btn:hover { border-color:rgba(250,248,245,0.22); color:rgba(250,248,245,0.78); background:rgba(255,255,255,0.05); }
  .hd-icon-btn:active { background:rgba(255,255,255,0.09); }
  .hd-icon-btn:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  .hd-icon-btn.active { border-color:rgba(201,176,114,0.38); color:var(--gold); }

  /* ── Search bar ──────────────────────────────────────────────────────────── */
  .search-bar { background:var(--navy-surface); border-bottom:1px solid rgba(201,176,114,0.1); display:none; }
  .search-bar.open { display:block; }
  .search-inner { max-width:1080px; margin:0 auto; padding:var(--sp3) var(--sp5); display:flex; gap:var(--sp2); }
  .search-input { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:var(--sp2) var(--sp3); font-family:'Noto Sans KR',sans-serif; font-size:var(--fs-4); color:#FAF8F5; outline:none; transition:border-color var(--t-micro); min-height:44px; }
  .search-input::placeholder { color:rgba(250,248,245,0.24); }
  .search-input:focus { border-color:rgba(201,176,114,0.42); }
  .search-go { padding:0 var(--sp4); background:var(--gold); color:var(--navy); border:none; border-radius:6px; font-family:'DM Mono',monospace; font-size:var(--fs-3); font-weight:600; cursor:pointer; white-space:nowrap; min-height:44px; transition:opacity var(--t-micro); }
  .search-go:hover { opacity:0.88; }
  .search-go:active { opacity:0.75; }
  .search-result-label { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.12em; text-transform:uppercase; color:#aaa; margin-bottom:var(--sp4); }

  /* ── Side panel ──────────────────────────────────────────────────────────── */
  .sp-overlay { position:fixed; inset:0; background:hsla(228,60%,6%,.5); z-index:1500; display:none; }
  .sp-overlay.open { display:block; }
  .side-panel { position:fixed; top:0; right:0; height:100%; width:360px; max-width:90vw; background:var(--bg); z-index:1600; transform:translateX(100%); transition:transform var(--t-std) cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:-4px 0 40px hsla(228,60%,8%,.2); }
  .side-panel.open { transform:translateX(0); }
  .sp-hd { background:var(--navy-dark); padding:env(safe-area-inset-top,var(--sp4)) var(--sp4) var(--sp3); padding-top:calc(env(safe-area-inset-top,0px) + var(--sp4)); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .sp-title { font-family:'Noto Serif KR',serif; font-size:var(--fs-5); font-weight:600; color:#FAF8F5; }
  .sp-close { background:none; border:none; cursor:pointer; color:rgba(250,248,245,0.4); font-size:22px; line-height:1; padding:var(--sp1); transition:color var(--t-micro); min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
  .sp-close:hover { color:#FAF8F5; }
  .sp-body { flex:1; overflow-y:auto; }
  .sp-body::-webkit-scrollbar { width:3px; }
  .sp-body::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }
  .sp-sec { border-bottom:1px solid #EAE6E0; }
  .sp-sec-hd { padding:var(--sp3) var(--sp4) var(--sp2); display:flex; justify-content:space-between; align-items:center; }
  .sp-sec-title { font-family:'DM Mono',monospace; font-size:var(--fs-3); letter-spacing:0.14em; text-transform:uppercase; color:var(--navy); }
  .sp-sec-count { font-family:'DM Mono',monospace; font-size:var(--fs-3); color:#bbb; }
  .sp-empty { padding:var(--sp4) var(--sp4) var(--sp5); color:#bbb; font-size:var(--fs-4); line-height:1.7; }
  .bm-item { display:flex; align-items:flex-start; gap:var(--sp2); padding:var(--sp2) var(--sp4); cursor:default; transition:background var(--t-micro); }
  .bm-item:hover { background:#F0EDE8; }
  .bm-item-content { flex:1; min-width:0; }
  .bm-item-tag { font-family:'DM Mono',monospace; font-size:var(--fs-2); letter-spacing:0.1em; text-transform:uppercase; color:var(--navy); opacity:0.5; margin-bottom:var(--sp1); }
  .bm-item-headline { font-family:'Noto Serif KR',serif; font-size:var(--fs-4); font-weight:600; color:#111827; line-height:1.45; }
  .bm-rm-btn { flex-shrink:0; background:none; border:none; cursor:pointer; color:#ccc; font-size:16px; padding:var(--sp1); line-height:1; transition:color var(--t-micro); min-width:36px; min-height:36px; display:flex; align-items:center; justify-content:center; }
  .bm-rm-btn:hover { color:#EF5350; }
  .arch-sp-item { padding:var(--sp3) var(--sp4); cursor:pointer; border-top:1px solid #EDE9E3; transition:background var(--t-micro); }
  .arch-sp-item:hover { background:#F0EDE8; }
  .arch-sp-date { font-family:'Noto Serif KR',serif; font-size:var(--fs-5); font-weight:600; color:#111827; }
  .arch-sp-sub { font-family:'DM Mono',monospace; font-size:var(--fs-3); color:#aaa; margin-top:var(--sp1); }

  /* ── iOS hint / update bar ───────────────────────────────────────────────── */
  .ios-hint { background:var(--navy); color:#FAF8F5; border-radius:8px; padding:var(--sp3) var(--sp4); margin-bottom:var(--sp3); font-size:var(--fs-4); line-height:1.7; display:none; }
  .ios-hint.show { display:block; }
  .ios-hint strong { display:block; font-family:'Noto Serif KR',serif; font-size:var(--fs-5); margin-bottom:var(--sp1); }
  .ios-hint button { background:var(--gold); color:var(--navy); border:none; border-radius:4px; padding:var(--sp1) var(--sp3); font-size:var(--fs-4); font-weight:700; cursor:pointer; margin-top:var(--sp2); min-height:36px; }
  .update-bar { text-align:center; padding:var(--sp2); font-family:'DM Mono',monospace; font-size:var(--fs-3); color:#bbb; border-top:1px solid #ece8e0; margin-top:var(--sp5); }

  /* ── Archive ─────────────────────────────────────────────────────────────── */
  .arch-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp4); flex-wrap:wrap; gap:var(--sp2); }
  .arch-title { font-family:'Noto Serif KR',serif; font-size:var(--fs-6); font-weight:600; color:#111827; }
  .arch-back { display:inline-flex; align-items:center; gap:var(--sp1); font-size:var(--fs-4); color:var(--navy); border:1px solid var(--border); border-radius:6px; padding:var(--sp2) var(--sp3); background:#fff; cursor:pointer; text-decoration:none; font-family:'Noto Sans KR',sans-serif; transition:background var(--t-micro),box-shadow var(--t-micro); min-height:44px; }
  .arch-back:hover { background:var(--warm-mid); box-shadow:var(--sh-xs); }

    <button class="tab" id="tab-paper" onclick="switchTab('paper',this)">소비자 논문</button>
    <button class="tab" id="tab-firm" onclick="switchTab('firm',this)">기업 분석</button>
  </div>
</div>

<div class="search-bar" id="search-bar">
  <div class="search-inner">
    <input class="search-input" id="search-input" placeholder="키워드로 브리핑 검색..." onkeydown="if(event.key==='Enter')doSearch()">

    Safari 하단 공유 버튼 → "홈 화면에 추가" 를 탭하면 앱처럼 사용할 수 있어요.
    <button onclick="this.closest('.ios-hint').remove()">닫기</button>

  <div class="panel on" id="panel-econ"><div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div></div>
  <div class="panel" id="panel-pol"><div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div></div>
  <div class="panel" id="panel-con"><div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div></div>

               placeholder="논문 제목, 저자, 키워드 검색..."

<script>
  const now = new Date();
  document.getElementById('hdate').textContent = now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  document.getElementById('htime').textContent = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ' 업데이트';

  function switchTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('panel-' + id).classList.add('on');
    if (id === 'paper') ensurePapersLoaded();
    if (id === 'firm') ensureCompaniesLoaded();
  }

  // 특정 날짜 아카이브 열기
  async function openArchiveDate(date) {
    const panel = document.getElementById('panel-archive');
    panel.innerHTML = '<div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>';
    try {
      const res = await fetch(`archive/${date}.json?t=` + Date.now());
      if (!res.ok) throw new Error();
      const data = await res.json();
      const s = data.sections || {};
      const [y, m, d] = date.split('-');
      const weekday = new Date(date).toLocaleDateString('ko-KR', { weekday: 'long' });
      let activeSection = 'econ';

      function renderArchiveSection(secId) {
        const sectionMap = { econ: s.econ, pol: s.politics, con: s.consumer };
        const secData = sectionMap[secId];
        const tc = secId === 'econ' ? '' : secId;
        if (!secData || !secData.cards || !secData.cards.length) {
          return '<div class="empty"><p>데이터가 없습니다.</p></div>';
        }
        const bms = getBookmarks();
        const cards = secData.cards.map((c, i) => {
          const cardId = `arch-${date}-${secId}-${i}`;
          window._cardData[cardId] = { ...c, tc };
          return cardHtml(cardId, c, tc, !!bms[cardId]);
        }).join('');
        return `<div class="summary"><div class="sum-label">요약</div><div class="sum-text">${secData.summary||''}</div></div><div class="news-list">${cards}</div>`;
      }

      function renderArchivePanel() {
        const tabs = [['econ','경제 상황'],['pol','정치·사회'],['con','소비자 이슈']].map(([id,label]) =>
          `<button class="arch-detail-tab ${id===activeSection?'on':''}" onclick="archSwitchTab('${id}',this)">${label}</button>`
        ).join('');
        panel.innerHTML = `
          <div class="arch-header">
            <div class="arch-title">${m}월 ${parseInt(d)}일 (${weekday}) 브리핑</div>
            <button class="arch-back" onclick="toggleSidePanel()">← 목록으로</button>
          </div>
          <div class="arch-detail-tabs">${tabs}</div>
          <div id="arch-content">${renderArchiveSection(activeSection)}</div>`;
        window._archRenderSection = renderArchiveSection;
      }

      window.archSwitchTab = function(secId, btn) {
        activeSection = secId;
        document.querySelectorAll('.arch-detail-tab').forEach(t => t.classList.remove('on'));
        btn.classList.add('on');

    } catch {
      panel.innerHTML = '<div class="empty"><p>브리핑을 불러오지 못했어요.</p></div>';
    }
  }

  function renderSection(id, data) {
    const tc = id === 'econ' ? '' : id === 'pol' ? 'pol' : 'con';
    if (!data || !data.cards || !data.cards.length) {
      document.getElementById('panel-' + id).innerHTML = '<div class="empty"><p>아직 오늘의 브리핑이 없어요.<br>매일 오전 7시에 자동 업데이트됩니다.</p></div>';
      return;
    }
    const bms = getBookmarks();
    const cards = data.cards.map((c, i) => {
      const cardId = `today-${id}-${i}`;
      window._cardData[cardId] = { ...c, tc };
      const sources = (c.sources && c.sources.length) ? `<div class="sources"><span class="src-label">출처</span>${c.sources.map(s=>`<a class="src-link" href="${s.url||'#'}" target="_blank" rel="noopener">${s.title||'출처'}</a>`).join('')}</div>` : (c.source_ids && c.source_ids.length ? `<div class="sources"><span class="src-label">출처</span>${c.source_ids.map(sid=>`<span class="src-label">${sid}</span>`).join('')}</div>` : '');
      return cardHtml(cardId, c, tc, !!bms[cardId]);
    }).join('');
    document.getElementById('panel-' + id).innerHTML = `
      <div class="summary"><div class="sum-label">오늘의 요약</div><div class="sum-text">${data.summary||''}</div></div>
      <div class="news-list">${cards}</div>`;
  }

  function renderCharts(mc) {
    const W = 600, H = 72;
    const DEFS = [{ key:'kospi', label:'KOSPI' }, { key:'nasdaq', label:'NASDAQ' }];

    function buildCoords(history) {
      const prices = history.map(h => h.close);
      const min = Math.min(...prices), max = Math.max(...prices);
      const range = max - min || 1;
      return prices.map((p, i) => ({
        x: (i / (prices.length - 1)) * W,
        y: H - 5 - ((p - min) / range) * (H - 12),
        price: p,
        date: history[i].date
      }));
    }

    function showChart(key) {
      const d = mc[key];
      const valEl = document.getElementById('chart-val-big');
      const chgEl = document.getElementById('chart-chg-big');
      const area  = document.getElementById('chart-svg-area');
      if (!d) {
        valEl.textContent = '—';
        chgEl.textContent = 'NO DATA';
        chgEl.className = 'chart-chg-big';
        area.innerHTML = '<div class="chart-no-data">데이터 없음</div>';
        return;
      }
      const up = d.change_pct >= 0;
      const color = up ? '#66BB6A' : '#EF5350';
      const arrow = up ? '▲' : '▼';
      valEl.textContent = d.current.toLocaleString();
      chgEl.textContent = `${arrow}${Math.abs(d.change_pct).toFixed(2)}%`;
      chgEl.className = `chart-chg-big ${up ? 'up' : 'dn'}`;

      const coords = buildCoords(d.history);
      const pts = coords.map(c => `${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');

      area.innerHTML = `
        <div class="chart-wrap">
          <div id="chart-tooltip" class="chart-tooltip"></div>
          <svg id="chart-svg" width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;cursor:crosshair">
            <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
            <line id="chart-xhair" x1="0" y1="0" x2="0" y2="${H}" stroke="rgba(250,248,245,0.22)" stroke-width="1" stroke-dasharray="3,2" visibility="hidden"/>
            <circle id="chart-dot" r="3.5" fill="${color}" stroke="#000C22" stroke-width="1.5" visibility="hidden"/>
            <rect id="chart-overlay" width="${W}" height="${H}" fill="transparent"/>
          </svg>
        </div>`;

      const svg     = document.getElementById('chart-svg');
      const xhair   = document.getElementById('chart-xhair');
      const dot     = document.getElementById('chart-dot');
      const tooltip = document.getElementById('chart-tooltip');
      const overlay = document.getElementById('chart-overlay');

      overlay.addEventListener('mousemove', function(e) {
        const rect = svg.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (W / rect.width);
        const n = coords.length;
        const idx = Math.min(Math.max(Math.round(mx / W * (n - 1)), 0), n - 1);
        const c = coords[idx];
        xhair.setAttribute('x1', c.x.toFixed(1)); xhair.setAttribute('x2', c.x.toFixed(1));
        xhair.setAttribute('visibility', 'visible');
        dot.setAttribute('cx', c.x.toFixed(1)); dot.setAttribute('cy', c.y.toFixed(1));
        dot.setAttribute('visibility', 'visible');
        const [, m, day] = c.date.split('-');
        tooltip.textContent = `${parseInt(m)}/${parseInt(day)}  ${c.price.toLocaleString()}`;
        tooltip.style.opacity = '1';
        const pxLeft = e.clientX - rect.left;
        const flip = pxLeft > rect.width * 0.65;
        tooltip.style.left  = flip ? 'auto' : (pxLeft + 12) + 'px';
        tooltip.style.right = flip ? (rect.width - pxLeft + 12) + 'px' : 'auto';
        tooltip.style.top = Math.max(2, e.clientY - rect.top - 32) + 'px';
      });
      overlay.addEventListener('mouseleave', function() {
        xhair.setAttribute('visibility', 'hidden');
        dot.setAttribute('visibility', 'hidden');
        tooltip.style.opacity = '0';
      });
    }

    window.switchChart = function(key, btn) {
      document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('on'));
      btn.classList.add('on');
      showChart(key);
    };

    // 항상 두 탭 모두 표시
    const tabs = DEFS.map(({ key, label }, i) =>
      `<button class="chart-tab${i===0?' on':''}" onclick="switchChart('${key}',this)">${label}</button>`
    ).join('');

    const row = document.getElementById('charts-row');
    row.innerHTML = `<div class="charts-inner">
      <div class="chart-top">
        <div class="chart-tabs">${tabs}</div>
        <div class="chart-stat">
          <span id="chart-val-big" class="chart-val-big"></span>
          <span id="chart-chg-big" class="chart-chg-big"></span>
        </div>
      </div>
      <div id="chart-svg-area"></div>
    </div>`;
    row.style.display = 'block';
    showChart(DEFS[0].key);
  }

  async function loadBriefing() {
    try {
      const res = await fetch('briefing.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      const data = await res.json();
      const s = data.sections || {};
      renderSection('econ', s.econ);
      renderSection('pol', s.politics);
      renderSection('con', s.consumer);

      const econCards = (s.econ || {}).cards || [];
      const allText = econCards.map(c => (c.body || '') + ' ' + (c.headline || '')).join(' ');
      const kospi = allText.match(/KOSPI[가는이]?\s*([\d,]+\.?\d*)/i)?.[1] || '—';
      const fx = allText.match(/원달러환율[은이]?\s*([\d,]+)원/)?.[1] || allText.match(/([\d,]+)원을\s*기록/)?.[1] || allText.match(/(1[,\d]+)원/)?.[1] || '—';
      const rate = allText.match(/기준금리[를은이]?\s*([\d.]+)%/)?.[1] || allText.match(/([\d.]+)%에서\s*동결/)?.[1] || allText.match(/([\d.]+)%로\s*동결/)?.[1] || '—';
      document.getElementById('ticker').innerHTML = `
        <div class="ti">KOSPI <b>${kospi !== '—' ? kospi : '—'}</b></div>
        <div class="ti">USD/KRW <b>${fx !== '—' ? fx + '원' : '—'}</b></div>
        <div class="ti">기준금리 <b>${rate !== '—' ? rate + '%' : '—'}</b></div>
        <div class="ti">업데이트 <b>${data.date_kr || '—'}</b></div>`;
      document.getElementById('ubar').textContent = '마지막 업데이트: ' + (data.date_kr || '—');
      if (data.market_charts) renderCharts(data.market_charts);
    } catch {
      ['econ','pol','con'].forEach(id => {
        document.getElementById('panel-' + id).innerHTML = '<div class="empty"><p>브리핑을 불러오지 못했어요.<br>매일 오전 7시에 자동 업데이트됩니다.</p></div>';
      });
    }
  }

  // sw.js는 PWA 캐시용으로만 등록 (FCM은 firebase-messaging-sw.js가 별도 처리)
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

  // 알림 활성 여부: 브라우저 권한 granted + FCM 토큰 존재 + 사용자가 끄지 않은 상태
  function isNotifOn() {
    return 'Notification' in window
      && Notification.permission === 'granted'
      && !!localStorage.getItem('fcm_token_key')
      && !localStorage.getItem('notif_off');
  }

  // 알림 토글 버튼 상태 업데이트 (FCM 모듈에서도 호출 가능하도록 window에 노출)
  window.updateNotifBtn = function() {
    const btn   = document.getElementById('notif-toggle');
    const label = document.getElementById('notif-toggle-label');
    if (!btn || !('Notification' in window)) return;
    if (isNotifOn()) {
      label.textContent = '알림 ON';
      btn.classList.add('on');
      btn.title = '클릭하면 알림이 꺼집니다';
    } else {
      label.textContent = '알림 OFF';
      btn.classList.remove('on');
      btn.title = Notification.permission === 'denied'
        ? '브라우저 설정에서 알림을 허용해 주세요'
        : '클릭해서 매일 오전 7시 알림 받기';
    }
  };
  window.updateNotifBtn();

  // 알림 버튼 클릭 핸들러 — ON이면 끄기, OFF면 켜기
  window.handleNotifBtn = function() {
    if (!('Notification' in window)) return;
    if (isNotifOn()) {
      if (typeof window.turnOffNotif === 'function') window.turnOffNotif();
    } else {
      if (typeof window.askNotif === 'function') window.askNotif();
    }
  };

  // ── 북마크 ──────────────────────────────────────────────────────────────────
  window._cardData = {};

  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem('bookmarks') || '{}'); } catch { return {}; }
  }

  const BM_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

  function bmBtn(cardId, isOn) {
    return `<button class="bm-btn${isOn?' on':''}" data-bm-id="${cardId}" onclick="toggleBookmark('${cardId}')" title="북마크">${BM_SVG}</button>`;
  }

  window.toggleBookmark = function(cardId) {
    const bms = getBookmarks();
    if (bms[cardId]) {
      delete bms[cardId];
    } else {
      const d = window._cardData[cardId];
      if (d) bms[cardId] = d;
    }
    localStorage.setItem('bookmarks', JSON.stringify(bms));
    document.querySelectorAll(`[data-bm-id="${cardId}"]`).forEach(btn => {
      btn.classList.toggle('on', !!bms[cardId]);
    });
    updateBmBtn();
    if (document.getElementById('side-panel').classList.contains('open')) renderSidePanel();
  };

  function cardHtml(cardId, c, tc, isOn) {
    const sources = (c.sources && c.sources.length)
      ? `<div class="article-source"><span class="src-label">출처</span>${c.sources.map(s=>`<a class="src-link" href="${s.url||'#'}" target="_blank" rel="noopener">${s.title||'출처'}</a>`).join('')}</div>`
      : '';
    const tcClass = tc ? ` ${tc}` : '';
    return `<div class="news-item${tcClass}">
      ${bmBtn(cardId,isOn)}
      <span class="article-tag">${c.tag||''}</span>
      <div class="article-title">${c.headline||''}</div>
      <div class="article-body">${c.body||''}</div>
      ${c.insight?`<div class="article-insight"><span class="i-label">소비자학 관점</span>${c.insight}</div>`:''}
      ${sources}
    </div>`;
  }

  function updateBmBtn() {
    const btn = document.getElementById('panel-btn');
    if (btn) btn.classList.toggle('active', Object.keys(getBookmarks()).length > 0);
  }

  function renderSidePanel() {
    const body = document.getElementById('sp-body');
    const entries = Object.entries(getBookmarks());
    const bmHtml = entries.length
      ? entries.map(([id, c]) => `
          <div class="bm-item">
            <div class="bm-item-content">
              <div class="bm-item-tag">${c.tag||''}</div>
              <div class="bm-item-headline">${c.headline||''}</div>
            </div>
            <button class="bm-rm-btn" onclick="toggleBookmark('${id}')" title="북마크 제거">×</button>
          </div>`).join('')
      : '<div class="sp-empty">저장된 북마크가 없어요</div>';

    body.innerHTML = `
      <div class="sp-sec">
        <div class="sp-sec-hd">
          <span class="sp-sec-title">북마크</span>
          <span class="sp-sec-count">${entries.length}개</span>
        </div>
        ${bmHtml}
      </div>
      <div class="sp-sec" id="sp-arch-sec">
        <div class="sp-sec-hd">
          <span class="sp-sec-title">아카이브</span>
        </div>
        <div class="sp-empty">불러오는 중...</div>
      </div>`;

    renderSidePanelArchive();
  }

  async function renderSidePanelArchive() {
    const sec = document.getElementById('sp-arch-sec');
    if (!sec) return;
    try {
      const res = await fetch('archive/index.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      const { dates } = await res.json();
      const sorted = [...dates].sort((a, b) => b.localeCompare(a));
      if (!sorted.length) {
        sec.querySelector('.sp-empty').textContent = '저장된 브리핑이 없어요';
        return;
      }
      const items = sorted.map(d => {
        const [y, m, day] = d.split('-');
        const weekday = new Date(d).toLocaleDateString('ko-KR', { weekday: 'short' });
        return `<div class="arch-sp-item" onclick="openArchiveFromPanel('${d}')">
          <div class="arch-sp-date">${m}월 ${parseInt(day)}일 (${weekday})</div>
          <div class="arch-sp-sub">${y} · 브리핑 보기 →</div>
        </div>`;
      }).join('');
      const hd = sec.querySelector('.sp-sec-hd');
      hd.innerHTML = `<span class="sp-sec-title">아카이브</span><span class="sp-sec-count">${sorted.length}개</span>`;
      hd.insertAdjacentHTML('afterend', items);
      sec.querySelector('.sp-empty')?.remove();
    } catch {
      const empty = sec.querySelector('.sp-empty');
      if (empty) empty.textContent = '아카이브를 불러오지 못했어요';
    }
  }

  window.toggleSidePanel = function() {
    const panel = document.getElementById('side-panel');
    if (panel.classList.contains('open')) {
      closeSidePanel();
    } else {
      renderSidePanel();
      document.getElementById('sp-overlay').classList.add('open');
      panel.classList.add('open');
      document.getElementById('panel-btn').classList.add('active');
    }
  };

  window.closeSidePanel = function() {
    document.getElementById('side-panel').classList.remove('open');
    document.getElementById('sp-overlay').classList.remove('open');
    updateBmBtn();
  };

  window.openArchiveFromPanel = function(date) {
    closeSidePanel();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    document.getElementById('panel-archive').classList.add('on');
    openArchiveDate(date);
  };

  // ── 검색 ────────────────────────────────────────────────────────────────────
  window.toggleSearch = function() {
    const bar = document.getElementById('search-bar');
    const btn = document.getElementById('search-btn');
    const isOpen = bar.classList.toggle('open');
    btn.classList.toggle('active', isOpen);
    if (isOpen) {
      document.getElementById('search-input').focus();
    } else {
      document.getElementById('search-input').value = '';
      document.getElementById('panel-search').classList.remove('on');
    }
  };

  window.doSearch = async function() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const sp = document.getElementById('panel-search');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    sp.classList.add('on');
    sp.innerHTML = '<div class="loading"><div class="spinner"></div><p>검색 중...</p></div>';
    try {
      const res = await fetch('archive/index.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      const { dates } = await res.json();
      const results = [];
      await Promise.all(dates.map(async d => {
        try {
          const r = await fetch(`archive/${d}.json`);
          if (!r.ok) return;
          const data = await r.json();
          const secMap = { econ: data.sections?.econ, pol: data.sections?.politics, con: data.sections?.consumer };
          for (const [secId, sec] of Object.entries(secMap)) {
            if (!sec?.cards) continue;
            sec.cards.forEach((c, i) => {
              const text = (c.headline + ' ' + c.body + ' ' + c.insight).toLowerCase();
              if (text.includes(q.toLowerCase())) {
                const cardId = `arch-${d}-${secId}-${i}`;
                const tc = secId === 'econ' ? '' : secId;
                window._cardData[cardId] = { ...c, tc };
                results.push({ cardId, c, tc, date: d });
              }
            });
          }
        } catch {}
      }));
      results.sort((a, b) => b.date.localeCompare(a.date));
      if (!results.length) {
        sp.innerHTML = `<div class="search-result-label">"${q}" 검색 결과 없음</div><div class="empty"><p>일치하는 브리핑이 없어요.</p></div>`;
        return;
      }
      const bms = getBookmarks();
      const cards = results.map(({ cardId, c, tc }) => cardHtml(cardId, c, tc, !!bms[cardId])).join('');
      sp.innerHTML = `<div class="search-result-label">"${q}" 검색 결과 ${results.length}건</div><div class="news-list">${cards}</div>`;
    } catch {
      sp.innerHTML = '<div class="empty"><p>검색 중 오류가 발생했어요.</p></div>';
    }
  };

  updateBmBtn();

  // ── 소비자 논문 탭 ──────────────────────────────────────────────────────────
  let _allPapers = [], _filteredPapers = [], _paperShowing = 0, _papersLoaded = false;
  const PAPER_PAGE = 20;

  async function ensurePapersLoaded() {
    if (_papersLoaded) return;
    const list = document.getElementById('paper-list');
    if (!list) return;
    list.innerHTML = '<div class="loading"><div class="spinner"></div><p>논문 목록 불러오는 중...</p></div>';
    try {
      const res = await fetch('papers.json?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      _allPapers = data.papers || [];
      _papersLoaded = true;

      // 연도 필터 옵션 동적 생성
      const years = [...new Set(_allPapers.map(p => p.year).filter(Boolean))].sort((a, b) => b - a);
      const ySel = document.getElementById('filter-year');
      if (ySel) years.forEach(y => {
        const o = document.createElement('option');
        o.value = y; o.textContent = y + '년';
        ySel.appendChild(o);
      });

      // 분석방법 필터 동적 생성 (데이터 기반)
      const methods = [...new Set(_allPapers.map(p => p.method).filter(Boolean))].sort();
      const mSel = document.getElementById('filter-method');
      if (mSel) methods.forEach(m => {
        const o = document.createElement('option');
        o.value = m; o.textContent = m;
        mSel.appendChild(o);
      });

      // 저자 체크박스 생성 (상위 20명)
      const authorCount = {};
      _allPapers.forEach(p => (p.authors || []).forEach(a => { authorCount[a] = (authorCount[a] || 0) + 1; }));
      const topAuthors = Object.entries(authorCount).sort((a, b) => b[1] - a[1]).slice(0, 20);
      const cbList = document.getElementById('author-cb-list');
      if (cbList) {
        if (topAuthors.length) {
          cbList.innerHTML = topAuthors.map(([name, cnt]) =>
            `<label class="paper-cb-item"><input type="checkbox" class="paper-author-cb" value="${name}" onchange="filterAndRenderPapers()"><span>${name}</span><span class="paper-cb-count">${cnt}</span></label>`
          ).join('');
        } else {
          cbList.innerHTML = '<span class="paper-cb-empty">저자 데이터 없음</span>';
        }
      }

      // 소속 체크박스 생성 (데이터 있으면)
      const hasAffil = _allPapers.some(p => p.affiliations && p.affiliations.length);
      if (hasAffil) {
        const affilCount = {};
        _allPapers.forEach(p => (p.affiliations || []).forEach(a => { if(a) affilCount[a] = (affilCount[a] || 0) + 1; }));
        const topAffils = Object.entries(affilCount).sort((a, b) => b[1] - a[1]).slice(0, 15);
        const afList = document.getElementById('affil-cb-list');
        const afGroup = document.getElementById('affil-cb-group');
        if (afGroup) afGroup.style.display = '';
        if (afList && topAffils.length) {
          afList.innerHTML = topAffils.map(([name, cnt]) =>
            `<label class="paper-cb-item"><input type="checkbox" class="paper-affil-cb" value="${name}" onchange="filterAndRenderPapers()"><span>${name}</span><span class="paper-cb-count">${cnt}</span></label>`
          ).join('');
        }
      }

      const info = document.getElementById('paper-result-info');
      if (info) info.dataset.updatedAt = (data.updated_at || '').slice(0, 10);

      filterAndRenderPapers();
    } catch {
      const list2 = document.getElementById('paper-list');
      if (list2) list2.innerHTML = `
        <div class="paper-setup-hint">
          <strong>📋 논문 데이터 수집 필요</strong>
          아래 스크립트를 KCI API 승인 IP에서 실행하면 논문 목록이 자동으로 업데이트됩니다.<br>
          <code>python scripts/fetch_papers.py</code><br>
          IP 화이트리스트 문의: <code>042-869-6736</code> (평일 09:00–18:00)
        </div>
        <div class="paper-empty-state">
          <div class="pei">📄</div>
          <p>아직 수집된 논문이 없어요.<br>스크립트를 실행하여 논문 데이터를 채워 주세요.</p>
        </div>`;
    }
  }

  window.filterAndRenderPapers = function() {
    if (!_papersLoaded) return;
    const q       = (document.getElementById('paper-search-input')?.value || '').toLowerCase().trim();
    const fSort   = document.getElementById('filter-sort')?.value || 'year';
    const fYear   = document.getElementById('filter-year')?.value || '';
    const fTopic  = document.getElementById('filter-topic')?.value || '';
    const fMethod = document.getElementById('filter-method')?.value || '';
    const selAuthors = [...document.querySelectorAll('.paper-author-cb:checked')].map(cb => cb.value);
    const selAffils  = [...document.querySelectorAll('.paper-affil-cb:checked')].map(cb => cb.value);

    const clearBtn = document.getElementById('paper-clear-btn');
    if (clearBtn) clearBtn.style.display = q ? 'block' : 'none';

    let papers = _allPapers.filter(p => {
      if (fYear   && String(p.year) !== fYear)  return false;
      if (fTopic  && p.topic !== fTopic)         return false;
      if (fMethod && p.method !== fMethod)        return false;
      if (selAuthors.length && !selAuthors.some(a => (p.authors || []).includes(a))) return false;
      if (selAffils.length  && !selAffils.some(a => (p.affiliations || []).some(af => af.includes(a)))) return false;
      if (q) {
        const txt = [p.title, ...(p.authors || []), p.abstract || '', ...(p.keywords || [])].join(' ').toLowerCase();
        if (!txt.includes(q)) return false;
      }
      return true;
    });

    if (fSort === 'year') {
      papers = [...papers].sort((a, b) => {
        if ((b.year || 0) !== (a.year || 0)) return (b.year || 0) - (a.year || 0);
        return (b.pub_month || 0) - (a.pub_month || 0);
      });
    } else if (fSort === 'citation') {
      papers = [...papers].sort((a, b) => (b.citation_count || 0) - (a.citation_count || 0));
    } else if (fSort === 'view') {
      papers = [...papers].sort((a, b) => (b.view_count || 0) - (a.view_count || 0));
    }
    // fSort === 'default': papers.json 원본 순서 유지

    _filteredPapers = papers;
    _paperShowing = 0;
    renderPaperSlice(true);
  };

  window.clearPaperSearch = function() {
    const inp = document.getElementById('paper-search-input');
    if (inp) { inp.value = ''; inp.focus(); }
    filterAndRenderPapers();
  };

  window.loadMorePapers = function() { renderPaperSlice(false); };

  function renderPaperSlice(reset) {
    const list     = document.getElementById('paper-list');
    const info     = document.getElementById('paper-result-info');
    const moreWrap = document.getElementById('paper-load-more-wrap');
    if (!list) return;

    const slice = _filteredPapers.slice(_paperShowing, _paperShowing + PAPER_PAGE);

    if (reset) {
      const hasFilter = (document.getElementById('paper-search-input')?.value.trim() ||
        document.getElementById('filter-year')?.value   ||
        document.getElementById('filter-topic')?.value  ||
        document.getElementById('filter-method')?.value ||
        (document.getElementById('filter-sort')?.value || 'year') !== 'year');
      const upd = info?.dataset.updatedAt || '';
      if (info) info.textContent = hasFilter
        ? `${_filteredPapers.length}건 검색됨 · 전체 ${_allPapers.length}건`
        : `총 ${_allPapers.length}건${upd ? ' · ' + upd + ' 기준' : ''}`;

      if (!_filteredPapers.length) {
        list.innerHTML = '<div class="paper-empty-state"><div class="pei">🔍</div><p>검색 결과가 없어요.<br>다른 키워드나 필터를 시도해 보세요.</p></div>';
        if (moreWrap) moreWrap.style.display = 'none';
        return;
      }
      list.innerHTML = slice.map(paperCardHtml).join('');
    } else {
      list.insertAdjacentHTML('beforeend', slice.map(paperCardHtml).join(''));
    }

    _paperShowing += slice.length;
    if (moreWrap) moreWrap.style.display = _paperShowing < _filteredPapers.length ? 'block' : 'none';
  }

  function paperCardHtml(p) {
    const url = 'https://www.kci.go.kr/kciportal/ci/sereArticleSearch/ciSereArtiView.kci?sereArticleSearchBean.artiId=' + encodeURIComponent(p.id || '');
    const authors = (p.authors || []).join(', ') || '—';
    const kws = (p.keywords || []).slice(0, 5).map(k => `<span class="paper-kw">${k}</span>`).join('');
    const statsHtml = (p.citation_count || p.view_count) ? `<div class="paper-card-stats">${p.view_count ? `<span class="paper-stat" title="조회수">👁 ${p.view_count.toLocaleString()}</span>` : ''}${p.citation_count ? `<span class="paper-stat" title="피인용수">📑 ${p.citation_count}</span>` : ''}</div>` : '';
    return `<a class="paper-card" href="${url}" target="_blank" rel="noopener">
  ${statsHtml}
  <div class="paper-card-tags" style="${statsHtml ? 'padding-right:100px' : ''}">
    ${p.journal ? `<span class="paper-chip journal">${p.journal}</span>` : ''}
    ${p.year    ? `<span class="paper-chip year">${p.year}</span>` : ''}
    ${p.topic   ? `<span class="paper-chip topic">${p.topic}</span>` : ''}
    ${p.method  ? `<span class="paper-chip method">${p.method}</span>` : ''}
  </div>
  <div class="paper-title-text">${p.title || ''}</div>
  <div class="paper-authors">${authors}</div>
  ${p.abstract ? `<div class="paper-abstract">${p.abstract}</div>` : ''}
  ${kws ? `<div class="paper-keywords">${kws}</div>` : ''}
</a>`;
  }

  // ── 고급 필터 토글 ───────────────────────────────────────────────────────────
  window.toggleAdvFilters = function() {
    const sec = document.getElementById('paper-adv-section');
    const btn = document.getElementById('paper-adv-btn');
    const open = sec.classList.toggle('open');
    btn.classList.toggle('open', open);
    btn.textContent = '저자 · 소속 ' + (open ? '▴' : '▾');
  };

  // ── 기업 분석 탭 ─────────────────────────────────────────────────────────────
  let _companiesLoaded = false, _companiesData = null, _activeIndustry = null;

  async function ensureCompaniesLoaded() {
    if (_companiesLoaded) { renderCompanyPanel(); return; }
    const container = document.getElementById('firm-content');
    if (!container) return;
    container.innerHTML = '<div class="loading"><div class="spinner"></div><p>기업 분석 불러오는 중...</p></div>';
    try {
      const res = await fetch('companies.json?t=' + Date.now());
      if (!res.ok) throw new Error();
      _companiesData = await res.json();
      _companiesLoaded = true;
      renderCompanyPanel();
    } catch {
      container.innerHTML = '<div class="empty"><p>기업 분석 데이터를 불러오지 못했어요.<br><small style="font-family:\'DM Mono\',monospace;font-size:11px;color:#bbb">python scripts/analyze_companies.py 실행 후 재시도</small></p></div>';
    }
  }

  function renderCompanyPanel() {
    const data = _companiesData;
    const container = document.getElementById('firm-content');
    if (!data || !data.industries || !data.industries.length || !container) return;
    if (!_activeIndustry) _activeIndustry = data.industries[0].id;

    const tabs = data.industries.map(ind =>
      `<button class="firm-industry-tab${ind.id === _activeIndustry ? ' on' : ''}" onclick="switchFirmIndustry('${ind.id}')">${ind.name}</button>`
    ).join('');

    const activeInd = data.industries.find(i => i.id === _activeIndustry);
    const cards = (activeInd?.companies || []).map(renderFirmCard).join('');
    const upd = data.updated_at ? data.updated_at.slice(0, 10) : '';

    container.innerHTML = `
      <div class="firm-industry-tabs">${tabs}</div>
      ${cards || '<div class="empty"><p>기업 데이터가 없어요.</p></div>'}
      ${upd ? `<div class="update-bar">기업 분석 기준일: ${upd}</div>` : ''}`;
  }

  window.switchFirmIndustry = function(id) {
    _activeIndustry = id;
    renderCompanyPanel();
  };

  function renderFirmCard(c) {
    const swot = c.swot || {};
    const swotHtml = `<div class="firm-swot">
      <div class="firm-swot-item s"><div class="firm-swot-label">Strengths · 강점</div><ul class="firm-swot-list">${(swot.strengths||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
      <div class="firm-swot-item w"><div class="firm-swot-label">Weaknesses · 약점</div><ul class="firm-swot-list">${(swot.weaknesses||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
      <div class="firm-swot-item o"><div class="firm-swot-label">Opportunities · 기회</div><ul class="firm-swot-list">${(swot.opportunities||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
      <div class="firm-swot-item t"><div class="firm-swot-label">Threats · 위협</div><ul class="firm-swot-list">${(swot.threats||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
    </div>`;
    const issues = (c.recent_issues||[]).map(issue =>
      `<div class="firm-issue-item"><div class="firm-issue-title">${issue.title}</div><div class="firm-issue-content">${issue.content}</div></div>`
    ).join('');
    const meta = [c.ticker && `<span class="paper-chip year">${c.ticker}</span>`, c.country && `<span class="paper-chip journal">${c.country}</span>`].filter(Boolean).join('');
    return `<div class="firm-company-card">
      <div class="firm-company-name">${c.name_ko||c.name}</div>
      <div class="firm-company-sub">${c.name}</div>
      <div class="firm-company-meta">${meta}</div>
      ${c.overview ? `<span class="firm-section-label">기업 개요</span><div class="firm-section-text">${c.overview}</div>` : ''}
      <span class="firm-section-label" style="margin-top:22px">SWOT 분석</span>
      ${swotHtml}
      ${c.consumer_strategy ? `<span class="firm-section-label">소비자 전략</span><div class="firm-section-text">${c.consumer_strategy}</div>` : ''}
      ${issues ? `<span class="firm-section-label">최근 이슈</span><div class="firm-issues">${issues}</div>` : ''}
      <div class="firm-updated">기준일: ${c.updated_at||''}</div>
    </div>`;
  }

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) document.getElementById('ios-hint').classList.add('show');

  loadBriefing();
</script>

<!-- Firebase Cloud Messaging -->
<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getMessaging, getToken, deleteToken } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging.js';

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAijGdIJXGidRLUZTMYb2A-4LFvunFMUDo",
  authDomain:        "consumer-briefing.firebaseapp.com",
  projectId:         "consumer-briefing",
  storageBucket:     "consumer-briefing.appspot.com",
  messagingSenderId: "579742111110",
  appId:             "1:579742111110:web:26a7408aac887c4b0b8807"
};
const FCM_VAPID_KEY = "BB1qlZhAHRsG-Zefd9K-DcLLWL7ysZ66iMtXFB75STlN3IBGvKs4T4F9J-Pn8Od23ITvRdS0HPayWcAcmqRN9ck";
const FIREBASE_DB_URL = "https://consumer-briefing-default-rtdb.asia-southeast1.firebasedatabase.app";

// ── 디버그 헬퍼 ──────────────────────────────────────────────────────────────
const dbg = (...a) => console.log('[FCM]', ...a);
const dbgErr = (...a) => console.error('[FCM]', ...a);

// ── Firebase 초기화 ──────────────────────────────────────────────────────────
let _messaging = null;
try {
  dbg('Firebase 초기화 시작...');
  const app = initializeApp(FIREBASE_CONFIG);
  _messaging = getMessaging(app);
  dbg('Firebase 초기화 성공 ✓');
} catch (e) {
  dbgErr('Firebase 초기화 실패:', e);
}

// ── 환경 진단 (페이지 로드 시 자동 실행) ────────────────────────────────────
dbg('환경 진단:');
dbg('  HTTPS 여부:', location.protocol === 'https:' ? '✓' : '✗ (HTTPS 필요)');
dbg('  ServiceWorker 지원:', 'serviceWorker' in navigator ? '✓' : '✗');
dbg('  Notification 지원:', 'Notification' in window ? '✓' : '✗');
dbg('  현재 알림 권한:', Notification.permission);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    dbg('  등록된 SW 목록:', regs.map(r => r.scope));
  });
}

// ── 토큰 등록 ────────────────────────────────────────────────────────────────
async function registerToken() {
  const swReg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
  dbg('SW scope:', swReg.scope);
  await navigator.serviceWorker.ready;
  dbg('SW ready ✓');

  dbg('FCM 토큰 요청 중 (VAPID 사용)...');
  const token = await getToken(_messaging, {
    vapidKey: FCM_VAPID_KEY,
    serviceWorkerRegistration: swReg
  });
  if (!token) throw new Error('getToken()이 빈 값 반환');
  dbg('토큰 발급 성공 ✓ (앞 20자):', token.substring(0, 20) + '...');

  const key = token.substring(0, 40).replace(/[.#$[\]]/g, '_');
  localStorage.setItem('fcm_token_key', key); // 나중에 삭제할 때 사용

  dbg('DB 저장 중... PUT →', `fcm_tokens/${key}`);
  const res = await fetch(`${FIREBASE_DB_URL}/fcm_tokens/${key}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, created_at: new Date().toISOString() })
  });
  dbg('HTTP 응답:', res.status, res.statusText);
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`DB 저장 실패 (${res.status}): ${body}`);
  }
  dbg('DB 저장 성공 ✓');
}

// ── 이미 권한 granted + 사용자가 끄지 않은 경우 자동 토큰 등록 ──────────────
async function registerTokenIfGranted() {
  if (!_messaging || Notification.permission !== 'granted') return;
  if (localStorage.getItem('notif_off') === '1') {
    dbg('사용자가 알림을 끈 상태 → 자동 등록 건너뜀');
    return;
  }
  dbg('권한 이미 granted → 자동 토큰 등록 시도');
  try {
    await registerToken();
    dbg('자동 토큰 등록 완료 ✓');
  } catch (err) {
    dbgErr('자동 토큰 등록 실패:', err);
  }
  if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
}
registerTokenIfGranted();

// ── 알림 켜기 ────────────────────────────────────────────────────────────────
window.askNotif = async function() {
  if (!_messaging) { dbgErr('messaging 객체 없음'); return; }
  dbg('── 알림 켜기 시작 ──');
  try {
    dbg('알림 권한 요청...');
    const perm = await Notification.requestPermission();
    dbg('결과:', perm);
    if (perm !== 'granted') {
      dbgErr('알림 권한 거부됨');
      if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
      return;
    }

    await registerToken();
    localStorage.removeItem('notif_off');

    new Notification('알림 설정 완료!', {
      body: '매일 오전 7시에 브리핑을 보내드려요.',
      icon: 'snu_ui_download.png',
      tag: 'briefing-confirm'
    });
    dbg('── 알림 켜기 완료 ──');
    if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
  } catch (err) {
    dbgErr('알림 켜기 실패:', err);
  }
};

// ── 알림 끄기 ────────────────────────────────────────────────────────────────
window.turnOffNotif = async function() {
  dbg('── 알림 끄기 시작 ──');
  try {
    // 1) FCM SDK 토큰 삭제 (브라우저 레벨)
    if (_messaging) {
      await deleteToken(_messaging);
      dbg('FCM 토큰 삭제 완료 ✓');
    }
    // 2) Firebase DB에서 토큰 삭제
    const key = localStorage.getItem('fcm_token_key');
    if (key) {
      const res = await fetch(`${FIREBASE_DB_URL}/fcm_tokens/${key}.json`, { method: 'DELETE' });
      dbg('DB 토큰 삭제 HTTP 응답:', res.status, res.statusText);
      localStorage.removeItem('fcm_token_key');
    } else {
      dbg('저장된 토큰 키 없음 — DB 삭제 건너뜀');
    }
    // 3) 사용자 OFF 상태 저장
    localStorage.setItem('notif_off', '1');
    dbg('── 알림 끄기 완료 ──');
    if (typeof window.updateNotifBtn === 'function') window.updateNotifBtn();
  } catch (err) {
    dbgErr('알림 끄기 실패:', err);
  }
};
</script>
