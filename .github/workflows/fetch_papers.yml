name: KCI 소비자 논문 수집

# KCI API는 등록된 IP에서만 호출 가능합니다.
# GitHub-hosted runner가 차단될 경우 self-hosted runner를 사용하거나
# workflow_dispatch로 직접 실행하세요.
on:
  schedule:
    - cron: "0 0 * * 1"   # 매주 월요일 한국시간 09:00 (UTC 00:00)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: 논문 수집
        env:
          KCI_API_KEY: ${{ secrets.KCI_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: 커밋 푸시
        run: |
          git config --global user.name "Papers Bot"
          git config --global user.email "bot@briefing"
          git add docs/papers.json
          git diff --staged --quiet || git commit -m "논문 업데이트: $(date +'%Y-%m-%d')"
          git push
